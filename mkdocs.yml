site_name: OmniLaTeX
site_description: Universal LaTeX document class with 27 doctypes, 21 institutions, 25 languages
site_url: https://wyattau.github.io/OmniLaTeX-template/
repo_url: https://github.com/WyattAu/OmniLaTeX-template
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
  - scheme: default
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: slate
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  features:
  - navigation.indexes
  - navigation.sections
  - navigation.instant
  - navigation.tracking
  - toc.follow
  - search.suggest
  - search.highlight
  - content.code.copy
  logo:
  favicon:

plugins:
- search
- markdown-exec

markdown_extensions:
- toc:
    permalink: true
    slugify: !!python/object/apply:pymdownx.slugs.slugify
      kwds:
        case: lower
- admonition
- pymdownx.details
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.tasklist:
    custom_checkbox: true
- def_list
- attr_list
- md_in_html

nav:
- Home: index.md
- Gallery:
  - PDF Gallery: index.html
  - Template Picker: gallery.html
  - Build Verification: verify.html
- Getting Started:
  - User Guide: USER_GUIDE.md
  - Migration Guide: MIGRATION_GUIDE.md
  - FAQ: FAQ.md
  - Overleaf: OVERLEAF.md
- Reference:
  - API Reference: API_REFERENCE.md
  - Document Types: gallery.md
  - Institution Gallery: INSTITUTION_GALLERY.md
  - Editor Integration: editor-integration.md
- Advanced:
  - Accessibility: accessibility.md
  - Performance: PERFORMANCE.md
  - API Stability: API_STABILITY.md
  - Breaking Changes: BREAKING_CHANGES.md
  - Plugin Catalog: PLUGIN_CATALOG.md
  - Localization Guide: LOCALIZATION_GUIDE.md
- Distribution:
  - Institution Contributing: INSTITUTION_CONTRIBUTING.md
  - Language Expansion: language-expansion/LANGUAGE_EXPANSION_GUIDE.md
- Manual:
  - Plan: manual/PLAN.md
  - Part I - Foundations: manual/PART_I_FOUNDATIONS.md
  - Part II - Doctypes: manual/PART_II_DOCTYPES.md
  - Parts III-XI: manual/PARTS_III_THROUGH_XI.md

extra:
  version: 2.5.0

validation:
  absolute_links: warn
  unrecognized_links: warn
