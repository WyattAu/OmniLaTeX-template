# Cloudflare Pages Configuration
# For Forgejo-hosted repositories
# Deploy MkDocs documentation site to Cloudflare Pages
#
# Usage:
#   wrangler pages deploy site/ --project-name=omnilatex-docs
#
# Or via Forgejo Actions (see .github/workflows/cloudflare-pages.yml)

name = "omnilatex-docs"
account_id = "26966ba2f4b3a12cb750cd615c8d0bcf"
compatibility_date = "2024-01-01"

# Cloudflare Pages does not use [build] from wrangler.toml.
# Build is configured in the dashboard or CI workflow:
#   Build command: pip install -r docs/requirements.txt && mkdocs build
#   Output directory: site

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=86400"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=86400"

[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=3600"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' api.github.com; frame-ancestors 'none'"

[[headers]]
for = "/pdfs/*"
[headers.values]
Cache-Control = "public, max-age=86400"
Content-Disposition = "inline"

[[redirects]]
from = "/docs"
to = "/USER_GUIDE/"
status = 302

[[redirects]]
from = "/api"
to = "/API_REFERENCE/"
status = 302

[[redirects]]
from = "/guide"
to = "/USER_GUIDE/"
status = 302
