# Cloudflare Pages Configuration
# For Forgejo-hosted repositories
# Deploy MkDocs documentation site to Cloudflare Pages
#
# Usage:
#   wrangler pages deploy site/ --project-name=omnilatex-docs
#
# Or via Forgejo Actions (see .github/workflows/cloudflare-pages.yml)

name = "omnilatex-docs"
# account_id is provided via CLOUDFLARE_ACCOUNT_ID environment variable in CI
# or via wrangler login for local development
compatibility_date = "2024-01-01"

# Cloudflare Pages does not use [build] from wrangler.toml.
# Build is configured in the dashboard or CI workflow:
#   Build command: pip install -r docs/requirements.txt && mkdocs build
#   Output directory: site

# Global security headers applied to all routes
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
Referrer-Policy = "strict-origin-when-cross-origin"
Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=86400"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=86400"

[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=3600"
Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' api.github.com; frame-ancestors 'none'"

[[headers]]
for = "/pdfs/*"
[headers.values]
Cache-Control = "public, max-age=86400"
Content-Disposition = "inline"

[[redirects]]
from = "/docs"
to = "/USER_GUIDE/"
status = 302

[[redirects]]
from = "/api"
to = "/API_REFERENCE/"
status = 302

[[redirects]]
from = "/guide"
to = "/USER_GUIDE/"
status = 302
