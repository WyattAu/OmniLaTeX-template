<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Browse 48 professionally crafted OmniLaTeX document templates with PDF previews.">
<meta name="theme-color" content="#0A0E13">
<meta property="og:title" content="OmniLaTeX - Document Gallery">
<meta property="og:description" content="48 professionally crafted LaTeX document templates.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://wyattau.github.io/OmniLaTeX-template/assets/og-image.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
<title>OmniLaTeX — Document Gallery</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="design-tokens.css">
<link rel="stylesheet" href="index.css">
<style>
header .tagline{color:var(--text-muted);font-size:1rem;max-width:520px;margin:0 auto;font-family:var(--font-mono)}

.container{max-width:1200px;margin:0 auto;padding:0 var(--space-lg)}
section{padding:var(--space-xl) 0}

.cat-tabs{
  display:flex;gap:var(--space-xs);margin-bottom:var(--space-lg);overflow-x:auto;
  padding-bottom:var(--space-xs);scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.cat-tabs::-webkit-scrollbar{height:4px}
.cat-tabs::-webkit-scrollbar-track{background:transparent}
.cat-tabs::-webkit-scrollbar-thumb{background:var(--border)}
.cat-tab{
  padding:8px 18px;font-size:.78rem;font-weight:700;
  background:var(--bg-card);color:var(--text-muted);
  border:var(--brutal-border);cursor:pointer;white-space:nowrap;transition:all .15s;
  text-transform:uppercase;letter-spacing:.06em;
}
.cat-tab:hover{border-color:var(--text-muted);color:var(--text)}
.cat-tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}

.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--space-md);
}
.card{
  background:var(--bg-card);border:var(--brutal-border);
  overflow:hidden;cursor:pointer;transition:all .15s;position:relative;
}
.card::before{
  content:'';position:absolute;top:0;left:0;width:3px;bottom:0;
  background:var(--accent);opacity:0;transition:opacity .15s;z-index:2;
}
.card:hover{border-color:var(--border-light);transform:translateY(-2px);box-shadow:var(--depth-2)}
.card:hover::before{opacity:1}
.card.featured{grid-column:1/-1}
.card.featured .card-preview{height:320px}

.card-preview{
  height:200px;background:var(--bg-surface);position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.card-preview iframe{
  width:200%;height:200%;border:none;
  transform:scale(.5);transform-origin:top left;
  pointer-events:none;
}
.card-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:var(--text-muted);
}
.card-placeholder svg{opacity:.3}
.card-placeholder span{font-size:.72rem;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.08em}

@keyframes shimmer{
  0%{background-position:-400px 0}
  100%{background-position:400px 0}
}
.card-loading .card-preview::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,var(--bg-surface) 25%,var(--bg-elevated) 50%,var(--bg-surface) 75%);
  background-size:400px 100%;animation:shimmer 1.5s infinite;z-index:1;
}

.card-info{padding:var(--space-md) var(--space-lg)}
.card-name{font-weight:800;font-size:.88rem;margin-bottom:2px;text-transform:uppercase;letter-spacing:.02em}
.card-desc{font-size:.75rem;color:var(--text-muted);line-height:1.4;margin-bottom:8px;font-family:var(--font-mono)}
.card-cat{
  font-size:.65rem;color:var(--text-muted);
  background:var(--bg);padding:3px 8px;display:inline-block;
  text-transform:uppercase;letter-spacing:.08em;font-weight:700;
  border:1px solid var(--border);
}

.lightbox{
  position:fixed;inset:0;z-index:1000;display:none;
  background:rgba(0,0,0,.92);backdrop-filter:blur(4px);
  flex-direction:column;
}
.lightbox.open{display:flex}
.lightbox-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:var(--space-md) var(--space-lg);background:var(--bg-card);
  border-bottom:var(--brutal-border);flex-shrink:0;
}
.lightbox-title{font-weight:800;font-size:.9rem;text-transform:uppercase;letter-spacing:.04em}
.lightbox-close{
  width:36px;height:36px;background:var(--bg-surface);color:var(--text-secondary);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;transition:all .15s;border:var(--brutal-border);
}
.lightbox-close:hover{background:var(--text);color:var(--bg);border-color:var(--text)}
.lightbox-body{flex:1;position:relative}
.lightbox-body iframe{width:100%;height:100%;border:none}

.empty-state{
  text-align:center;padding:80px var(--space-lg);color:var(--text-muted);
  grid-column:1/-1;
}
.empty-state svg{margin-bottom:var(--space-md);opacity:.2}
.empty-state p{font-size:.85rem;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em}

@media(max-width:768px){
  header{padding:32px var(--space-md) 28px}
  header .logo{font-size:2rem}
  .container{padding:0 var(--space-md)}
  section{padding:32px 0}
  .grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:var(--space-sm)}
  nav{gap:4px;padding:var(--space-md) var(--space-md);flex-wrap:wrap}
  nav a{padding:6px 12px;font-size:.72rem}
  .cat-tabs{gap:4px}
  .cat-tab{padding:6px 12px;font-size:.72rem}
}
@media(max-width:480px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to content</a>

<header>
  <h1 class="logo">OMNI<span>LATEX</span></h1>
  <p class="tagline">48 document templates // 27 doctypes // 21 institutions // 25 languages</p>
</header>

<nav aria-label="Main navigation">
  <a href="gallery.html">Template Picker</a>
  <a href="index.html" class="active" aria-current="page">PDF Gallery</a>
  <a href="verify.html">Verify Builds</a>
  <a href="https://github.com/WyattAu/OmniLaTeX-template" target="_blank" rel="noopener noreferrer">GitHub</a>
</nav>

<main id="main-content">
<section>
  <div class="container">
    <div class="cat-tabs" id="cat-tabs" role="tablist" aria-label="Document categories"></div>
    <div class="grid" id="doc-grid" role="tabpanel" aria-label="Documents" aria-live="polite"></div>
  </div>
</section>
</main>

<footer>
  <p>
    OmniLaTeX Template &mdash;
    <a href="https://github.com/WyattAu/OmniLaTeX-template" target="_blank" rel="noopener noreferrer">GitHub</a> &middot;
    <a href="https://github.com/WyattAu/OmniLaTeX-template/issues" target="_blank" rel="noopener noreferrer">Issues</a>
  </p>
</footer>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="PDF preview" hidden>
  <div class="lightbox-header">
    <span class="lightbox-title" id="lb-title"></span>
    <button class="lightbox-close" id="lb-close" aria-label="Close">&times;</button>
  </div>
  <div class="lightbox-body">
    <iframe id="lb-iframe" title="PDF preview"></iframe>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
