repos:
  # General file checks
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: trailing-whitespace
    args: [--markdown-linebreak-ext=md]
  - id: end-of-file-fixer
    exclude: ^(.*\.pdf|.*\.png|.*\.jpg|.*\.svg)$
  - id: check-yaml
  - id: check-added-large-files
    args: [--maxkb=5000]
  - id: check-case-conflict
  - id: check-merge-conflict
  - id: check-toml
  - id: detect-private-key
  - id: mixed-line-ending
    args: [--fix=lf]

  # LaTeX specific checks
- repo: https://github.com/jonasbb/pre-commit-latex-hooks
  rev: v1.5.0
  hooks:
  - id: american-eg-ie
  - id: cleveref-capitalization
  - id: consistent-spelling
    args:
    - --emph=et al.
    - --emph=a priori
    - --emph=a posteriori
  - id: csquotes
  - id: ensure-labels-for-sections
  - id: no-space-in-cite
  - id: tilde-cite
    exclude: ^content/        # May have different citation styles
  - id: unique-labels

  # Python code formatting (for test scripts)
- repo: https://github.com/psf/black
  rev: 25.1.0
  hooks:
  - id: black
    language_version: python3
    files: ^tests/.*\.py$

  # Python import sorting
- repo: https://github.com/PyCQA/isort
  rev: 7.0.0
  hooks:
  - id: isort
    args: [--profile, black]
    files: ^tests/.*\.py$

  # Python linting
- repo: https://github.com/PyCQA/flake8
  rev: 7.3.0
  hooks:
  - id: flake8
    args: [--max-line-length=100, '--extend-ignore=E203,W503']
    files: ^tests/.*\.py$

  # Markdown linting
- repo: https://github.com/igorshubovych/markdownlint-cli
  rev: v0.38.0
  hooks:
  - id: markdownlint
    args: [--fix]
    exclude: ^extensions/

  # YAML formatting
- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: v2.16.0
  hooks:
  - id: pretty-format-yaml
    args: [--autofix, --indent, '2']
    exclude: ^(\\.woodpecker\\.yml|\\.github/workflows/)
    language_version: python3

  # Check for common LaTeX mistakes
- repo: local
  hooks:
  - id: check-latex-todos
    name: Check for TODO markers in LaTeX files
    entry: grep -n "\\\\todo\|TODO\|FIXME"
    language: system
    files: \.tex$
    pass_filenames: true
        # This will fail if TODOs are found - comment out if you want to allow TODOs
        # stages: [manual]

  - id: run-pytest-fast
    name: Run non-Docker pytest suite (structural + property + visual regression + institutions + config)
    entry: python3 -m pytest tests/test_modules.py tests/test_ctan.py tests/test_properties.py tests/test_visual_regression.py tests/test_build_py.py tests/test_institutions.py tests/test_negative.py tests/test_config.py -v --timeout=120 -m "not slow" --tb=short -q
    language: system
    pass_filenames: false
    always_run: true
    verbose: true

  - id: check-lean-proofs
    name: Verify Lean 4 proofs compile (lake build)
    entry: bash -c "cd specs/proofs && lake build 2>&1 | tail -5"
    language: system
    pass_filenames: false
    always_run: true
    verbose: true

  # Spell checking (optional - requires aspell)
  # - repo: https://github.com/codespell-project/codespell
