# =============================================================================
# Risk Register
# =============================================================================
[[risk]]
id = "R01"
title = "l3build incompatibility with non-standard layout"
likelihood = "medium"
impact = "high"
mitigation = "Validate early in Phase 3; fallback to custom test harness if needed"

[[risk]]
id = "R02"
title = "Nix TeX Live missing required packages"
likelihood = "medium"
impact = "medium"
mitigation = "Use texlive.withPackages overrides; contribute upstream if needed"

[[risk]]
id = "R03"
title = "Lean 4 proofs too complex for LaTeX internals"
likelihood = "medium"
impact = "low"
mitigation = "Accept proof sketches for complex properties; focus proofs on document model"

[[risk]]
id = "R04"
title = "Lazy loading breaks existing documents"
likelihood = "low"
impact = "high"
mitigation = "Maintain backward-compatible 'load all' default; gradual opt-in"

[[risk]]
id = "R05"
title = "Preamble precompilation conflicts with dynamic config"
likelihood = "medium"
impact = "medium"
mitigation = "Detect config changes and invalidate .fmt cache automatically"

[[risk]]
id = "R06"
title = "Visual regression false positives from font rendering"
likelihood = "high"
impact = "medium"
mitigation = "Use perceptual diff (SSIM) instead of pixel-exact comparison"
