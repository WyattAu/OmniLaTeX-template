# ---------------------------------------------------------------------------
# Module Load Order (28 OmniLaTeX modules in lib/)
# ---------------------------------------------------------------------------

[modules]
total_count = 28
unconditional_count = 14
conditional_count = 7
on_demand_count = 5
toggle_count = 6

[modules.unconditional]
description = "Always loaded regardless of options"
load_order = [
    { index = 1,  path = "lib/core/omnilatex-base",                category = "core" },
    { index = 2,  path = "lib/utils/omnilatex-colors",             category = "utils" },
    { index = 3,  path = "lib/utils/omnilatex-utils",              category = "utils" },
    { index = 4,  path = "lib/typography/omnilatex-fonts",         category = "typography" },
    { index = 5,  path = "lib/typography/omnilatex-lists",         category = "typography" },
    { index = 6,  path = "lib/typography/omnilatex-typesetting",   category = "typography" },
    { index = 7,  path = "lib/layout/omnilatex-page",              category = "layout" },
    { index = 8,  path = "lib/layout/omnilatex-koma",              category = "layout" },
    { index = 9,  path = "lib/layout/omnilatex-floats",            category = "layout" },
    { index = 10, path = "lib/layout/omnilatex-boxes",             category = "layout" },
    { index = 11, path = "lib/layout/omnilatex-document",          category = "layout" },
    { index = 12, path = "lib/references/omnilatex-hyperref",      category = "references" },
    { index = 13, path = "lib/language/omnilatex-i18n",            category = "language" },
    { index = 14, path = "lib/references/omnilatex-biblio",        category = "references" },
]

[modules.conditional_language]
description = "Loaded automatically based on document language"
modules = [
    { path = "lib/language/omnilatex-cjk",  condition = "language in {simplifiedchinese, traditionalchinese, japanese, korean}" },
    { path = "lib/language/omnilatex-rtl",  condition = "language in {arabic, hebrew, persian}" },
]

[modules.conditional_toggles]
description = "Loaded based on user boolean toggle options (6 toggles controlling 7 modules)"
modules = [
    { path = "lib/typography/omnilatex-math",          toggle = "enablemath",        default = true },
    { path = "lib/graphics/omnilatex-graphics",        toggle = "enabletikz",        default = true },
    { path = "lib/graphics/omnilatex-tikz-core",       toggle = "enabletikz",        default = true },
    { path = "lib/graphics/omnilatex-tikz-engineering", toggle = "enableengineering", default = true },
    { path = "lib/code/omnilatex-listings",            toggle = "enablecode",        default = true },
    { path = "lib/tables/omnilatex-tables",            toggle = "enabletables",      default = true },
    { path = "lib/references/omnilatex-glossary",      toggle = "loadGlossaries",    default = false },
]

[modules.on_demand]
description = "Loaded on-demand by doctypes when needed"
modules = [
    { path = "lib/layout/omnilatex-themes",        loaded_by = "poster, presentation, etc." },
    { path = "lib/layout/omnilatex-presentation",   loaded_by = "presentation" },
    { path = "lib/accessibility/omnilatex-accessibility", loaded_by = "various doctypes" },
    { path = "lib/presentation/omnilatex-beamer",   loaded_by = "presentation (beamer mode)" },
    { path = "lib/references/omnilatex-citations",   loaded_by = "doctypes with citation needs" },
]

# ---------------------------------------------------------------------------
# Base Class Distribution
# ---------------------------------------------------------------------------

[base_class_distribution]
scrbook = 4
scrreprt = 5
scrartcl = 17
