# ---------------------------------------------------------------------------
# Unconditional Module Load List (21 OmniLaTeX modules)
# ---------------------------------------------------------------------------

[modules]
count = 22
load_order = [
    { index = 1,  path = "lib/core/omnilatex-base",                category = "core" },
    { index = 2,  path = "lib/utils/omnilatex-colors",             category = "utils" },
    { index = 3,  path = "lib/utils/omnilatex-utils",              category = "utils" },
    { index = 4,  path = "lib/typography/omnilatex-fonts",         category = "typography" },
    { index = 5,  path = "lib/typography/omnilatex-math",          category = "typography" },
    { index = 6,  path = "lib/typography/omnilatex-lists",         category = "typography" },
    { index = 7,  path = "lib/typography/omnilatex-typesetting",   category = "typography" },
    { index = 8,  path = "lib/graphics/omnilatex-graphics",        category = "graphics" },
    { index = 9,  path = "lib/graphics/omnilatex-tikz-core",       category = "graphics" },
    { index = 10, path = "lib/graphics/omnilatex-tikz-engineering", category = "graphics" },
    { index = 11, path = "lib/language/omnilatex-i18n",            category = "language" },
    { index = 12, path = "lib/language/omnilatex-cjk",             category = "language", condition = "language in {chinese,japanese,korean}" },
    { index = 12, path = "lib/language/omnilatex-rtl",             category = "language", condition = "language in {arabic,hebrew}" },
