# ---------------------------------------------------------------------------
# Validation Rules
# ---------------------------------------------------------------------------

[validation]

[validation.doctype]
rule = "case-insensitive match"
normalization = "\\tl_lower_case:n applied after \\tl_trim_spaces:N"
fallback = "If no alias matches, the initial setdoctype{book} from line 103 of omnilatex.cls remains active. No warning is currently emitted for unrecognized doctypes."
recommendation = "A future version should emit a ClassWarning for unrecognized doctype values."

[validation.titlestyle]
rule = "case-insensitive match"
normalization = "\\tl_lower_case:n applied after \\tl_trim_spaces:N"
fallback = "Unrecognized values result in no title style customization; the default KOMA \\maketitle is used."

[validation.institution]
rule = "exact string match, then filesystem probe"
fallback = "ClassWarning emitted if institution file is not found."

[validation.bool_options]
rule = "Standard kvoptions boolean parsing"
true_values = ["true", "on", "yes", "1"]
false_values = ["false", "off", "no", "0"]

