name: Build LaTeX Document

env:
  DOCKER_IMAGE: ghcr.io/wyattau/omnilatex-docker@sha256:c786cdab072096917a94f0cc99a14a9d086a8f2b2813e619656563c5bf974b66  # See .env.docker

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ${{ env.DOCKER_IMAGE }}

    steps:
    - name: Checkout repository
      # v4
      uses: https://code.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 0

    - name: Run lint (preflight)
      env:
        IS_OMNILATEX_CONTAINER: 'true'
        CI: 'true'
      run: |
        python3 build.py --mode prod lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ${{ env.DOCKER_IMAGE }}

    steps:
    - name: Checkout repository
      # v4
      uses: https://code.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 0

    - name: Build all documents (Production mode)
      env:
        IS_OMNILATEX_CONTAINER: 'true'
        CI: 'true'
      run: |
        python3 build.py --mode prod build-all

    - name: Upload root PDF
      # v4
      uses: https://code.forgejo.org/actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: PDF-Root
        path: main.pdf

    - name: Upload example PDFs
      # v4
      uses: https://code.forgejo.org/actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: PDF-Examples
        path: build/examples/*.pdf

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    container:
      image: ${{ env.DOCKER_IMAGE }}

    steps:
    - name: Checkout repository
      # v4
      uses: https://code.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 0

    - name: Download root PDF
      # v4
      uses: https://code.forgejo.org/actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      with:
        name: PDF-Root
        path: .

    - name: Download example PDFs
      # v4
      uses: https://code.forgejo.org/actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      with:
        name: PDF-Examples
        path: build/examples

    - name: Run tests
      env:
        IS_OMNILATEX_CONTAINER: 'true'
        CI: 'true'
      run: |
        pip install -q pymupdf pytest PyYAML python-dateutil PaperSize pytest-timeout hypothesis
        python3 -m pytest tests/test_modules.py tests/test_ctan.py tests/test_properties.py tests/test_config.py tests/test_institutions.py tests/test_negative.py tests/test_build_py.py --tb=short -q --timeout=60 -m "not slow"
