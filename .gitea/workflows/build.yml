name: Build LaTeX Document

env:
  DOCKER_IMAGE: ghcr.io/wyattau/omnilatex-docker@sha256:dae352cb84391a30478c0a18778bc0c82e8b620a3e56dd14a894433f7dd90988  # See .env.docker

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ${{ env.DOCKER_IMAGE }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Build all documents (Production mode)
      env:
        IS_OMNILATEX_CONTAINER: 'true'
        CI: 'true'
      run: |
        python3 build.py --mode prod build-all

    - name: Upload root PDF
      uses: actions/upload-artifact@v4
      with:
        name: PDF-Root
        path: main.pdf

    - name: Upload example PDFs
      uses: actions/upload-artifact@v4
      with:
        name: PDF-Examples
        path: build/examples/*.pdf

  test:
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ${{ env.DOCKER_IMAGE }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download root PDF
      uses: actions/download-artifact@v4
      with:
        name: PDF-Root
        path: .

    - name: Download example PDFs
      uses: actions/download-artifact@v4
      with:
        name: PDF-Examples
        path: build/examples

    - name: Run tests
      env:
        IS_OMNILATEX_CONTAINER: 'true'
        CI: 'true'
      run: |
        pip install -q pymupdf pytest PyYAML python-dateutil PaperSize pytest-timeout hypothesis
        python3 -m pytest tests/test_modules.py tests/test_ctan.py tests/test_properties.py --tb=short -q
