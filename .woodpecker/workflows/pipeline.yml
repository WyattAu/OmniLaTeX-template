# Docker image reference — update .env.docker when bumping the version.
# Woodpecker does not support global variables for image fields,
# so each job references the same image directly.
pipeline:
  lint:
    image: ghcr.io/wyattau/omnilatex-docker@sha256:a7f88e9af5b8176b57252a9d2abcbec57d928a7b68c25a27c893f3a4dc2fa33b
    time_limit: 30m
    environment:
    - IS_OMNILATEX_CONTAINER=true
    - CI=true
    commands:
    - python3 build.py --mode prod lint
    when:
      event: [push, pull_request, tag]

  build:
    image: ghcr.io/wyattau/omnilatex-docker@sha256:a7f88e9af5b8176b57252a9d2abcbec57d928a7b68c25a27c893f3a4dc2fa33b
    time_limit: 30m
    environment:
    - IS_OMNILATEX_CONTAINER=true
    - CI=true
    commands:
    - python3 build.py --mode prod build-all
    when:
      event: [push, pull_request, tag]
    depends_on:
    - lint

  test:
    image: ghcr.io/wyattau/omnilatex-docker@sha256:a7f88e9af5b8176b57252a9d2abcbec57d928a7b68c25a27c893f3a4dc2fa33b
    time_limit: 30m
    environment:
    - IS_OMNILATEX_CONTAINER=true
    - CI=true
    commands:
    - python3 build.py --mode prod test
    when:
      event: [push, pull_request, tag]
    depends_on:
    - build

branches:
  include: [main, master, develop, feature/*, bugfix/*]

when:
  event: [push, pull_request, tag]
