<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniLaTeX Editor</title>
  <meta name="description" content="Browser-based LaTeX editor with live preview">
  <meta name="theme-color" content="#0A0E13">
  <style>
    :root {
      --bg: #0A0E13;
      --bg-panel: #161B22;
      --bg-editor: #0D1117;
      --fg: #E6EDF3;
      --fg-muted: #8B949E;
      --accent: #4A90D9;
      --border: #21262D;
      --success: #7EE787;
      --error: #FF7B72;
      --warning: #FFA657;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .toolbar h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      letter-spacing: 0.02em;
    }

    .toolbar .spacer { flex: 1; }

    .toolbar button {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--fg);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .toolbar button:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .toolbar button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .toolbar button.primary:hover {
      background: #5BA0E9;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--fg-muted);
    }

    .status-dot.connected { background: var(--success); }
    .status-dot.compiling { background: var(--warning); animation: pulse 1s infinite; }
    .status-dot.error { background: var(--error); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .editor-container {
      flex: 1;
      overflow: hidden;
    }

    .log-pane {
      height: 150px;
      background: var(--bg-editor);
      border-top: 1px solid var(--border);
      overflow-y: auto;
      padding: 8px 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.5;
      color: var(--fg-muted);
    }

    .log-pane .error { color: var(--error); }
    .log-pane .warning { color: var(--warning); }
    .log-pane .success { color: var(--success); }

    .preview-pane {
      flex: 1;
      background: var(--bg-panel);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    .preview-pane iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    .preview-placeholder {
      color: var(--fg-muted);
      text-align: center;
      padding: 40px;
    }

    .preview-placeholder svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .preview-placeholder p {
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .main { flex-direction: column; }
      .editor-pane { border-right: none; border-bottom: 1px solid var(--border); }
      .log-pane { height: 100px; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="status-dot" id="status-dot"></div>
    <h1>OmniLaTeX Editor</h1>
    <div class="spacer"></div>
    <select id="doctype-select" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:12px;">
      <option value="article">Article</option>
      <option value="thesis">Thesis</option>
      <option value="book">Book</option>
      <option value="cv">CV</option>
      <option value="presentation">Presentation</option>
      <option value="letter">Letter</option>
    </select>
    <button id="btn-compile" class="primary">Compile</button>
    <button id="btn-download">Download PDF</button>
  </div>

  <div class="main">
    <div class="editor-pane">
      <div class="editor-container" id="editor-container"></div>
      <div class="log-pane" id="log-pane">
        <div>Ready. Press Compile or Ctrl+Enter to build.</div>
      </div>
    </div>
    <div class="preview-pane" id="preview-pane">
      <div class="preview-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
        </svg>
        <p>Compile your document to see the PDF preview here.</p>
      </div>
    </div>
  </div>

  <!-- Monaco Editor from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>

  <script>
    // OmniLaTeX Editor - Vanilla JS (no build step required)
    (function() {
      'use strict';

      // --- Configuration ---
      const WS_URL = 'ws://localhost:8765';
      const DEFAULT_DOCTYPE = 'article';
      const DEFAULT_TEMPLATE = `\\documentclass[
    language=english,
    doctype=${DEFAULT_DOCTYPE},
    institution=none,
]{omnilatex}

\\RequirePackage{config/document-settings}

\\begin{document}
\\maketitle

\\section{Introduction}
Your content here.

\\section{Methods}
Describe your methods.

\\section{Results}
Present your results.

\\section{Conclusion}
Summarize your findings.

\\end{document}
`;

      // --- State ---
      let editor = null;
      let ws = null;
      let pdfData = null;

      // --- DOM ---
      const statusDot = document.getElementById('status-dot');
      const btnCompile = document.getElementById('btn-compile');
      const btnDownload = document.getElementById('btn-download');
      const doctypeSelect = document.getElementById('doctype-select');
      const logPane = document.getElementById('log-pane');
      const previewPane = document.getElementById('preview-pane');

      // --- Monaco Editor Setup ---
      function initEditor() {
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });
        require(['vs/editor/editor.main'], function() {
          // Register LaTeX language
          monaco.languages.register({ id: 'latex' });
          monaco.languages.setMonarchTokensProvider('latex', {
            tokenizer: {
              root: [
                [/\\[a-zA-Z]+/, 'keyword'],
                [/%.*$/, 'comment'],
                [/\{[^}]*\}/, 'string'],
                [/\$[^$]*\$/, 'number'],
                [/\\[{}]/, 'delimiter'],
              ]
            }
          });

          editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: DEFAULT_TEMPLATE,
            language: 'latex',
            theme: 'vs-dark',
            fontSize: 14,
            fontFamily: "'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace",
            lineHeight: 22,
            minimap: { enabled: false },
            scrollBeyondLastLine: false,
            wordWrap: 'on',
            automaticLayout: true,
            tabSize: 4,
            renderWhitespace: 'selection',
          });

          // Ctrl+Enter to compile
          editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, function() {
            compile();
          });

          // Update template when doctype changes
          doctypeSelect.addEventListener('change', function() {
            const doctype = doctypeSelect.value;
            const model = editor.getModel();
            const current = model.getValue();
            const updated = current.replace(/doctype=[a-z-]+/, 'doctype=' + doctype);
            model.setValue(updated);
          });
        });
      }

      // --- WebSocket Connection ---
      function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) return;

        statusDot.className = 'status-dot';
        ws = new WebSocket(WS_URL);

        ws.onopen = function() {
          statusDot.className = 'status-dot connected';
          log('Connected to compilation server.', 'success');
        };

        ws.onmessage = function(event) {
          const msg = JSON.parse(event.data);
          switch (msg.type) {
            case 'log':
              log(msg.line);
              break;
            case 'error':
              log(msg.message, 'error');
              break;
            case 'success':
              log('Compilation successful.', 'success');
              if (msg.pdf) {
                pdfData = Uint8Array.from(atob(msg.pdf), c => c.charCodeAt(0));
                showPDF(pdfData);
              }
              statusDot.className = 'status-dot connected';
              btnCompile.textContent = 'Compile';
              btnCompile.disabled = false;
              break;
            case 'progress':
              log(msg.message, 'warning');
              break;
          }
        };

        ws.onclose = function() {
          statusDot.className = 'status-dot';
          log('Disconnected from server.', 'error');
          // Reconnect after 3s
          setTimeout(connect, 3000);
        };

        ws.onerror = function() {
          statusDot.className = 'status-dot error';
          log('Connection error. Is the server running?', 'error');
        };
      }

      // --- Compilation ---
      function compile() {
        if (!editor) return;

        const source = editor.getValue();
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          log('Not connected to server. Attempting reconnect...', 'error');
          connect();
          return;
        }

        statusDot.className = 'status-dot compiling';
        btnCompile.textContent = 'Compiling...';
        btnCompile.disabled = true;
        logPane.innerHTML = '';

        ws.send(JSON.stringify({
          type: 'compile',
          source: source,
          doctype: doctypeSelect.value,
        }));
      }

      // --- PDF Preview ---
      function showPDF(data) {
        const blob = new Blob([data], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        previewPane.innerHTML = '<iframe src="' + url + '"></iframe>';
      }

      // --- Download ---
      function downloadPDF() {
        if (!pdfData) {
          log('No PDF to download. Compile first.', 'error');
          return;
        }
        const blob = new Blob([pdfData], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'document.pdf';
        a.click();
        URL.revokeObjectURL(url);
      }

      // --- Logging ---
      function log(message, type) {
        const div = document.createElement('div');
        if (type) div.className = type;
        div.textContent = message;
        logPane.appendChild(div);
        logPane.scrollTop = logPane.scrollHeight;
      }

      // --- Event Listeners ---
      btnCompile.addEventListener('click', compile);
      btnDownload.addEventListener('click', downloadPDF);

      // --- Initialize ---
      initEditor();
      connect();
    })();
  </script>
</body>
</html>
