name: Setup TeX Live
description: Install TeX Live Full with caching
runs:
  using: composite
  steps:
  - name: Cache TeX Live
    id: cache-texlive
    uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae    # v5.0.5
    with:
      path: /usr/local/texlive
      key: texlive-2026-${{ runner.os }}-v1
      restore-keys: |
        texlive-2026-${{ runner.os }}-
  - name: Install TeX Live
    if: steps.cache-texlive.outputs.cache-hit != 'true'
    run: |
      wget -q https://mirror.ctan.org/systems/texlive/tlnet/install-tl-unx.tar.gz
      tar -xzf install-tl-unx.tar.gz
      cd install-tl-*/
      echo "selected_scheme scheme-full" > profile.tex
      echo "tlpdbopt_install_docfiles 0" >> profile.tex
      echo "tlpdbopt_install_srcfiles 0" >> profile.tex
      sudo ./install-tl --profile=profile.tex
      rm -rf install-tl-*
    shell: bash
  - name: Add TeX Live to PATH
      run: echo "/usr/local/texlive/2026/bin/x86_64-linux" >> $GITHUB_PATH
    shell: bash
  - name: Verify TeX Live
    run: lualatex --version | head -1
    shell: bash
