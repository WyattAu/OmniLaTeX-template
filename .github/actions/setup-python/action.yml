name: Setup Python
description: Setup Python with pip cache
inputs:
  python-version:
    description: Python version
    required: false
    default: '3.13'
runs:
  using: composite
  steps:
  - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065    # v5
    with:
      python-version: ${{ inputs.python-version }}
      cache: pip
  - run: pip install --upgrade pip
    shell: bash
