name: Language Integration Matrix

permissions:
  contents: read

concurrency:
  group: integration-matrix
  cancel-in-progress: false

# Docker image digest is sourced from .env.docker at runtime.
# The digest-sync workflow updates only .env.docker (no workflow file edits needed).

on:
  push:
    branches: [main, master]
    paths:
    - lib/language/**
    - omnilatex.cls
    - config/document-types/**
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  language-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [english, german, french, spanish, russian, chinese, japanese, korean, arabic, hebrew, hindi]
        doctype: [article, book, report]
    steps:
    - name: Checkout repository
        # v4
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 1

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Build language-doctype combination
      run: |
        mkdir -p /tmp/test-matrix
        printf '\\documentclass[doctype=%s,language=%s]{omnilatex}\n\\begin{document}\nTest document for language=%s, doctype=%s.\n\\section{Test Section}\nThis is a test paragraph.\n\\end{document}\n' \
          "${{ matrix.doctype }}" "${{ matrix.language }}" "${{ matrix.language }}" "${{ matrix.doctype }}" \
          > /tmp/test-matrix/main.tex

        docker run --rm \
          -v "$GITHUB_WORKSPACE:/opt/omnilatex" \
          -v "/tmp/test-matrix:/workspace" \
          -w /workspace \
          --user root \
          --entrypoint "" \
          "${{ steps.digest.outputs.image }}" \
          bash -c "cp -r /opt/omnilatex/omnilatex.cls /opt/omnilatex/lib /opt/omnilatex/config /workspace/ && lualatex --shell-escape --interaction=nonstopmode main.tex && lualatex --shell-escape --interaction=nonstopmode main.tex"

    - name: Verify PDF output
      run: |
        test -f /tmp/test-matrix/main.pdf || (echo "FAIL: No PDF generated" && exit 1)
        size=$(stat -c%s /tmp/test-matrix/main.pdf)
        echo "PDF size: ${size} bytes for ${{ matrix.language }}-${{ matrix.doctype }}"
        test "$size" -gt 1000 || (echo "FAIL: PDF too small (${size} bytes)" && exit 1)

  rtl-testing:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: [arabic, hebrew]
    steps:
    - name: Checkout repository
        # v4
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 1

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Build RTL document
      run: |
        mkdir -p /tmp/test-rtl
        printf '\\documentclass[doctype=article,language=%s]{omnilatex}\n\\begin{document}\nTest RTL document for %s.\n\\section{Test}\nContent in %s language.\n\\end{document}\n' \
          "${{ matrix.language }}" "${{ matrix.language }}" "${{ matrix.language }}" \
          > /tmp/test-rtl/main.tex

        docker run --rm \
          -v "$GITHUB_WORKSPACE:/opt/omnilatex" \
          -v "/tmp/test-rtl:/workspace" \
          -w /workspace \
          --user root \
          --entrypoint "" \
          "${{ steps.digest.outputs.image }}" \
          bash -c "cp -r /opt/omnilatex/omnilatex.cls /opt/omnilatex/lib /opt/omnilatex/config /workspace/ && lualatex --shell-escape --interaction=nonstopmode main.tex && lualatex --shell-escape --interaction=nonstopmode main.tex"

    - name: Verify RTL PDF
      run: |
        test -f /tmp/test-rtl/main.pdf || (echo "FAIL: No RTL PDF" && exit 1)
        echo "RTL PDF generated for ${{ matrix.language }}"

  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [language-matrix, rtl-testing]
    if: always()
    steps:
    - name: Matrix summary
      run: |
        echo "## Language Integration Matrix Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| language-matrix | ${{ needs.language-matrix.result == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| rtl-testing | ${{ needs.rtl-testing.result == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
