name: Language Integration Matrix

permissions:
  contents: read

concurrency:
  group: integration-matrix-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main, master]
    paths:
    - lib/language/**
    - lua/**
    - omnilatex.cls
    - config/document-types/**
  pull_request:
    branches: [main, master]
    paths:
    - lib/language/**
    - lua/**
    - omnilatex.cls
    - config/document-types/**
  workflow_dispatch:

jobs:
  language-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [english, german, french, spanish, italian, portuguese, russian, dutch, polish, czech, greek, turkish, chinese, japanese, korean, vietnamese, hindi, swedish, finnish, danish, norwegian, thai, bengali, ukrainian]
        doctype: [article, book, technicalreport]
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Build language-doctype combination
      run: |
        mkdir -p /tmp/test-matrix
        {
          echo "\\documentclass[doctype=$DOCTYPE,language=$LANGUAGE]{omnilatex}"
          echo '\begin{document}'
          echo "Test document for language=$LANGUAGE, doctype=$DOCTYPE."
          echo '\section{Test Section}'
          echo 'This is a test paragraph.'
          echo '\end{document}'
        } > /tmp/test-matrix/main.tex

        docker run --rm \
          -v "$GITHUB_WORKSPACE:/opt/omnilatex" \
          -v "/tmp/test-matrix:/workspace" \
          -w /workspace \
          --user root \
          --entrypoint "" \
          "${{ steps.digest.outputs.image }}" \
          bash -c "cp -r /opt/omnilatex/omnilatex.cls /opt/omnilatex/lib /opt/omnilatex/config /workspace/ && cp /opt/omnilatex/.latexmkrc /workspace/ 2>/dev/null || true && cp /workspace/config/omnilatex-document-settings.sty /workspace/config/document-settings.sty 2>/dev/null || true && cp -r /opt/omnilatex/bib /workspace/ 2>/dev/null || true && latexmk -interaction=nonstopmode -f -r /workspace/.latexmkrc main.tex && test -f main.pdf"
      env:
        LANGUAGE: ${{ matrix.language }}
        DOCTYPE: ${{ matrix.doctype }}

    - name: Verify PDF output
      run: |
        test -f /tmp/test-matrix/main.pdf || (echo "FAIL: No PDF generated" && exit 1)
        size=$(stat -c%s /tmp/test-matrix/main.pdf)
        echo "PDF size: ${size} bytes for ${LANGUAGE}-${DOCTYPE}"
        test "$size" -gt 1000 || (echo "FAIL: PDF too small (${size} bytes)" && exit 1)
      env:
        LANGUAGE: ${{ matrix.language }}
        DOCTYPE: ${{ matrix.doctype }}

  rtl-testing:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: [arabic, hebrew]
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Build RTL document
      run: |
        mkdir -p /tmp/test-rtl
        {
          echo "\\documentclass[doctype=article,language=$LANGUAGE]{omnilatex}"
          echo '\begin{document}'
          echo "Test RTL document for $LANGUAGE."
          echo '\section{Test}'
          echo "Content in $LANGUAGE language."
          echo '\end{document}'
        } > /tmp/test-rtl/main.tex

        docker run --rm \
          -v "$GITHUB_WORKSPACE:/opt/omnilatex" \
          -v "/tmp/test-rtl:/workspace" \
          -w /workspace \
          --user root \
          --entrypoint "" \
          "${{ steps.digest.outputs.image }}" \
          bash -c "cp -r /opt/omnilatex/omnilatex.cls /opt/omnilatex/lib /opt/omnilatex/config /workspace/ && cp /opt/omnilatex/.latexmkrc /workspace/ 2>/dev/null || true && cp /workspace/config/omnilatex-document-settings.sty /workspace/config/document-settings.sty 2>/dev/null || true && cp -r /opt/omnilatex/bib /workspace/ 2>/dev/null || true && latexmk -interaction=nonstopmode -f -r /workspace/.latexmkrc main.tex && test -f main.pdf"
      env:
        LANGUAGE: ${{ matrix.language }}

    - name: Verify RTL PDF
      run: |
        test -f /tmp/test-rtl/main.pdf || (echo "FAIL: No RTL PDF" && exit 1)
        echo "RTL PDF generated for $LANGUAGE"
      env:
        LANGUAGE: ${{ matrix.language }}

  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [language-matrix, rtl-testing]
    if: always()
    steps:
    - name: Matrix summary
      run: |
        echo "## Language Integration Matrix Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| language-matrix | ${{ needs.language-matrix.result == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| rtl-testing | ${{ needs.rtl-testing.result == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
