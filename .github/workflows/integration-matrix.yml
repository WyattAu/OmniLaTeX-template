name: Integration Matrix

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read

# NOTE: GitHub Actions does NOT support env context in container.image.
# Docker image digest managed in .env.docker — update both files together.
# Image: ghcr.io/wyattau/omnilatex-docker@sha256:dae352cb84391a30478c0a18778bc0c82e8b620a3e56dd14a894433f7dd90988

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: ghcr.io/wyattau/omnilatex-docker@sha256:dae352cb84391a30478c0a18778bc0c82e8b620a3e56dd14a894433f7dd90988
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - doctype: thesis
            language: english
          - doctype: article
            language: english
          - doctype: book
            language: english
          - doctype: presentation
            language: english
          - doctype: cv
            language: english
          - doctype: cover-letter
            language: english
          - doctype: dissertation
            language: english
          - doctype: manual
            language: english
          - doctype: patent
            language: english
          - doctype: thesis
            language: german
          - doctype: article
            language: german
          - doctype: article
            language: french
          - doctype: article
            language: chinese
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build ${{ matrix.doctype }} (${{ matrix.language }})
        env:
          IS_OMNILATEX_CONTAINER: "true"
          CI: "true"
          TEXINPUTS: ".:${{ github.workspace }}:"
        run: |
          # Copy .latexmkrc so latexmk picks up project-specific config
          cp .latexmkrc /tmp/.latexmkrc
          cat > /tmp/test.tex << 'TEXEOF'
          \documentclass[doctype=${{ matrix.doctype }},language=${{ matrix.language }}]{omnilatex}
          \begin{document}
          Integration test: ${{ matrix.doctype }} in ${{ matrix.language }}.
          \end{document}
          TEXEOF
          latexmk -lualatex -r /tmp/.latexmkrc -interaction=nonstopmode -outdir=/tmp/build /tmp/test.tex
          test -f /tmp/build/test.pdf && echo "SUCCESS" || echo "FAIL"

  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: matrix
    if: always()
    steps:
      - name: Matrix summary
        run: echo "Integration matrix completed. Check individual job results."
