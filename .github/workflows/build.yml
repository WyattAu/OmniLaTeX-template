name: Build LaTeX Document

permissions:
  contents: read
  packages: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Separate concurrency group for Pages deployment to prevent conflicts with docs.yml.
# Both build.yml and docs.yml deploy to the same github-pages environment.

# Docker image digest is sourced from .env.docker at runtime.
# The digest-sync workflow updates only .env.docker (no workflow file edits needed).

on:
  push:
    branches: [main, master]
    paths:
    - '**.tex'
    - '**.sty'
    - '**.cls'
    - '**.lua'
    - build.py
    - buildlib/**
    - lib/**
    - config/**
    - scripts/**
    - tests/**
    - .github/workflows/build.yml
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: ./.github/actions/setup-python

    - name: Install linting tools
      run: pip install -q black isort flake8 bandit

    - name: Run black --check
      run: black --check tests/ buildlib/ scripts/ tools/ build.py

    - name: Run isort --check
      run: isort --check --profile black tests/ buildlib/ scripts/ tools/ build.py

    - name: Run flake8
      run: flake8 tests/ buildlib/ scripts/ tools/ build.py --max-line-length=100 --extend-ignore=E203,W503

    - name: Run bandit security scan
      run: bandit -r buildlib/ -c pyproject.toml -q 2>/dev/null || bandit -r buildlib/ -q --skip B101

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
    - name: Dependency Review
      uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
      with:
        fail-on-severity: moderate

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Build all documents (Production mode)
      run: |
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          --user root \
          -e IS_OMNILATEX_CONTAINER=true \
          -e CI=true \
          "${{ steps.digest.outputs.image }}" \
          python3 build.py --mode prod --verbose build-all

    - name: Verify all examples built
      run: |
        EXPECTED=$(ls -d examples/*/main.tex 2>/dev/null | wc -l)
        ACTUAL=$(ls build/examples/*.pdf 2>/dev/null | wc -l)
        # All examples should now build (CJK/Hebrew fonts, beamer themes, accessibility all supported)
        MINIMUM=$EXPECTED
        echo "Expected $EXPECTED PDFs, found $ACTUAL (minimum required: $MINIMUM)"
        if [ "$ACTUAL" -lt "$MINIMUM" ]; then
          echo "::error::$((EXPECTED - ACTUAL)) example(s) failed to build"
          ls build/examples/*.pdf 2>/dev/null | sed 's|build/examples/||; s|\.pdf||' | sort > /tmp/built.txt
          ls -d examples/*/ | xargs -I{} basename {} | sort > /tmp/all.txt
          comm -23 /tmp/all.txt /tmp/built.txt | while read name; do
            echo "::error::Missing: $name"
          done
          exit 1
        fi
        echo "All $ACTUAL examples built successfully."

    - name: Upload root PDF
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: PDF-Root
        path: main.pdf
        if-no-files-found: error
        retention-days: 30

    - name: Upload example PDFs
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: PDF-Examples
        path: build/examples/*.pdf
        if-no-files-found: error
        retention-days: 30

  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Build examples with timings
      run: |
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          --user root \
          -e IS_OMNILATEX_CONTAINER=true \
          -e CI=true \
          "${{ steps.digest.outputs.image }}" \
          python3 build.py --mode prod --timings --force build-examples

    - name: Generate performance summary with regression detection
      if: always()
      run: |
        if [ -f build/metrics.json ]; then
          echo "## Build Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          docker run --rm --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            "${{ steps.digest.outputs.image }}" \
            python3 .github/scripts/extract_metrics.py >> $GITHUB_STEP_SUMMARY
        else
          echo "No metrics.json found" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload performance metrics
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: performance-metrics
        path: build/metrics.json
        retention-days: 90

  determinism:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: First build
      run: |
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          --user root \
          -e IS_OMNILATEX_CONTAINER=true \
          -e CI=true \
          "${{ steps.digest.outputs.image }}" \
          python3 build.py --mode prod --source-date-epoch 1700000000 build-example thesis
        cp build/examples/thesis.pdf /tmp/build1.pdf

    - name: Clean and rebuild
      run: |
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          --user root \
          "${{ steps.digest.outputs.image }}" \
          python3 build.py clean
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          --user root \
          -e IS_OMNILATEX_CONTAINER=true \
          -e CI=true \
          "${{ steps.digest.outputs.image }}" \
          python3 build.py --mode prod --source-date-epoch 1700000000 build-example thesis

    - name: Verify build reproducibility
      shell: bash
      run: |
        echo "Build 1 hash:"
        sha256sum /tmp/build1.pdf
        echo "Build 2 hash:"
        sha256sum build/examples/thesis.pdf

        # LuaLaTeX is not fully bit-for-bit deterministic (PDF object ordering,
        # Lua hash table randomization, font subsetting). Compare page counts
        # and file sizes instead of exact SHA256.
        #
        # NOTE: PAGES1 must read from /tmp/build1.pdf (build 1 output),
        # PAGES2 from build/examples/thesis.pdf (build 2 output).
        PAGES1=$(docker run --rm --entrypoint "" \
          -v /tmp:/tmp \
          "${{ steps.digest.outputs.image }}" \
          pdfinfo /tmp/build1.pdf | grep "^Pages:" | awk '{print $2}')
        PAGES2=$(docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          "${{ steps.digest.outputs.image }}" \
          pdfinfo /workspace/build/examples/thesis.pdf | grep "^Pages:" | awk '{print $2}')
        SIZE1=$(stat -c%s /tmp/build1.pdf)
        SIZE2=$(stat -c%s build/examples/thesis.pdf)

        echo "Build 1: ${PAGES1} pages, ${SIZE1} bytes"
        echo "Build 2: ${PAGES2} pages, ${SIZE2} bytes"

        if [ "$PAGES1" != "$PAGES2" ]; then
          echo "::error::Page count mismatch: ${PAGES1} vs ${PAGES2}"
          exit 1
        fi

        # Allow 3% file size tolerance for non-determinism.
        # LuaLaTeX font subsetting and PDF object reordering can cause
        # size variance across CI runners even with SOURCE_DATE_EPOCH.
        SIZE_DIFF=$(( (SIZE1 - SIZE2) < 0 ? (SIZE2 - SIZE1) : (SIZE1 - SIZE2) ))
        SIZE_MAX=$(( SIZE1 > SIZE2 ? SIZE1 : SIZE2 ))
        TOLERANCE=$(( SIZE_MAX * 3 / 100 ))  # 3%
        if [ "$SIZE_DIFF" -gt "$TOLERANCE" ]; then
          echo "::error::File size differs by more than 3%: ${SIZE_DIFF} bytes (tolerance: ${TOLERANCE})"
          exit 1
        fi

        echo "SUCCESS: Builds are reproducible (${PAGES1} pages, size diff: ${SIZE_DIFF} bytes)"

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Download root PDF
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: PDF-Root
        path: .

    - name: Download example PDFs
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: PDF-Examples
        path: build/examples

    - name: Install test deps and run integration tests
      run: |
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          --user root \
          -e CI=true \
          "${{ steps.digest.outputs.image }}" \
          bash -c "pip install -q pymupdf pytest PyYAML python-dateutil PaperSize pytest-timeout hypothesis pytest-cov && pytest tests/test_modules.py tests/test_ctan.py tests/test_properties.py tests/test_config.py tests/test_institutions.py tests/test_build_py.py tests/test_visual_regression.py tests/test_beamer_regression.py -v --tb=short --timeout=60 -m 'not slow' --junitxml=test-results.xml --cov=tests --cov=build.py --cov-report=term-missing --cov-report=xml"

    - name: Run edge case tests (slow)
      run: |
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          --user root \
          -e CI=true \
          "${{ steps.digest.outputs.image }}" \
          bash -c "pip install -q pymupdf pytest PyYAML python-dateutil PaperSize pytest-timeout && pytest tests/test_edge_cases.py -v --tb=short -m slow --timeout=300"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: test-results
        path: test-results.xml
        if-no-files-found: ignore
        retention-days: 7

    - name: Check coverage threshold
      if: always()
      run: |
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          "${{ steps.digest.outputs.image }}" \
          python3 << 'PYEOF'
        import xml.etree.ElementTree as ET, sys
        try:
            root = ET.parse("coverage.xml").getroot()
            rate = float(root.attrib.get("line-rate", "0"))
            pct = rate * 100
            threshold = 73.0
            if pct < threshold:
                sys.exit(1)
        except FileNotFoundError:
            pass
        PYEOF

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check CHANGELOG.md updated for .sty/.cls changes
      run: |
        # Get the list of changed .sty and .cls files vs the base branch
        CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.sty' '*.cls' 2>/dev/null || true)
        if [ -z "$CHANGED" ]; then
          echo "No .sty or .cls files changed — changelog check skipped."
          exit 0
        fi

        echo "Changed source files:"
        echo "$CHANGED"
        echo ""

        # Check if CHANGELOG.md was also modified
        CHANGELOG_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'CHANGELOG.md' 2>/dev/null || true)
        if [ -z "$CHANGELOG_CHANGED" ]; then
          echo "::error::.sty or .cls files were modified but CHANGELOG.md was not updated."
          echo "Please add an entry under [Unreleased] describing your changes."
          echo "See CONTRIBUTING.md for the changelog format."
          exit 1
        fi

        echo "CHANGELOG.md was updated."
