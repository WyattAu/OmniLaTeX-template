name: Build LaTeX Document

permissions:
  contents: read

# NOTE: GitHub Actions does NOT support env context in container.image.
# The Docker image digest is managed in .env.docker — update both files together.
# Image: ghcr.io/wyattau/omnilatex-docker@sha256:3e0c27240f5b0b02c3bc635628540de8f7adfd7b581165534f550432e634d9d5

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ghcr.io/wyattau/omnilatex-docker@sha256:3e0c27240f5b0b02c3bc635628540de8f7adfd7b581165534f550432e634d9d5
      options: --user root
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better git metadata
      
      - name: Build all documents (Production mode)
        env:
          IS_OMNILATEX_CONTAINER: "true"
          CI: "true"
        run: |
          python3 build.py --mode prod build-all
      
      - name: Upload root PDF
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Root
          path: main.pdf
          if-no-files-found: error
          retention-days: 30
      
      - name: Upload example PDFs
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Examples
          path: build/examples/*.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Prepare site bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p github-pages
          cp main.pdf github-pages/main.pdf
          if [ -d pages ]; then
            cp -r pages/. github-pages/
          fi
          cat <<'EOF' > github-pages/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Latest PDF build</title>
            <style>
              :root { color-scheme: light dark; }
              html, body { height: 100%; margin: 0; }
              body { display: flex; flex-direction: column; font-family: system-ui, sans-serif; background: #111; color: #f5f5f5; }
              header { padding: 1rem 1.5rem; background: rgba(0,0,0,0.6); }
              header h1 { margin: 0; font-size: 1.25rem; }
              header p { margin: 0.25rem 0 0; font-size: 0.95rem; }
              main { flex: 1; }
              iframe { width: 100%; height: 100%; border: none; background: #fff; }
              a { color: #4ea3ff; }
            </style>
          </head>
          <body>
            <header>
              <h1>Latest PDF build</h1>
              <p>View inline below or <a href="main.pdf">download main.pdf</a>.</p>
            </header>
            <main>
              <iframe src="main.pdf#toolbar=1&view=FitH" title="Preview of main.pdf"></iframe>
            </main>
          </body>
          </html>
          EOF

      - name: Upload site bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages
  
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    container:
      image: ghcr.io/wyattau/omnilatex-docker@sha256:3e0c27240f5b0b02c3bc635628540de8f7adfd7b581165534f550432e634d9d5
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download example PDFs
        uses: actions/download-artifact@v4
        with:
          name: PDF-Examples
          path: build/examples

      - name: Build examples with timings
        env:
          IS_OMNILATEX_CONTAINER: "true"
          CI: "true"
        run: |
          python3 build.py --mode prod --timings --force build-examples

      - name: Generate performance summary with regression detection
        if: always()
        run: |
          if [ -f build/metrics.json ]; then
            echo "## Build Performance Metrics" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python3 -c "
import json, sys

data = json.load(open('build/metrics.json'))

# Load baselines if available
baselines = {}
try:
    with open('specs/performance_baselines.toml') as f:
        import re
        for m in re.finditer(r'\[baselines\.(\S+?)\]\s+cold_median\s*=\s*([\d.]+)', f.read()):
            baselines[m.group(1)] = float(m.group(2))
except Exception:
    pass

print('| Example | Wall Time (s) | Baseline (s) | Delta | PDF Size | Status |')
print('|---------|---------------|-------------|-------|----------|--------|')

regressions = []
for ex in data.get('examples', []):
    status = ':white_check_mark:' if ex['success'] else ':x:'
    size_kb = ex.get('pdf_size_bytes', 0) / 1024
    name = ex['name']
    wall = ex['wall_time_s']

    if name in baselines:
        baseline = baselines[name]
        delta = wall - baseline
        delta_str = f'{delta:+.1f}s'
        # Flag regressions: > 50% slower than baseline
        if baseline > 0 and delta / baseline > 0.5:
            status = ':warning:'
            regressions.append((name, wall, baseline, delta))
    else:
        baseline = None
        delta_str = 'N/A'

    print(f'| {name} | {wall:.1f} | {baseline:.1f if baseline else \"N/A\":>8} | {delta_str:>6} | {size_kb:.0f} KB | {status} |')

s = data.get('summary', {})
print()
print(f\"**Total:** {s.get('total_time_s', 0):.1f}s across {s.get('total', 0)} examples ({s.get('successful', 0)} successful)\")

if regressions:
    print()
    print('### :warning: Performance Regressions Detected')
    print()
    print('| Example | Current (s) | Baseline (s) | Delta |')
    print('|---------|-------------|---------------|-------|')
    for name, wall, baseline, delta in regressions:
        print(f'| {name} | {wall:.1f} | {baseline:.1f} | {delta:+.1f}s |')
    print()
    print('Regressions are flagged when current time exceeds baseline by > 50%.')
    print('Baselines are in `specs/performance_baselines.toml`.')
    sys.exit(1)
" >> $GITHUB_STEP_SUMMARY
          else
            echo "No metrics.json found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload performance metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics
          path: build/metrics.json
          retention-days: 90

  determinism:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/wyattau/omnilatex-docker@sha256:3e0c27240f5b0b02c3bc635628540de8f7adfd7b581165534f550432e634d9d5
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: First build
        env:
          IS_OMNILATEX_CONTAINER: "true"
          CI: "true"
        run: |
          python3 build.py --mode prod --source-date-epoch 1700000000 build-example thesis
          cp build/examples/thesis.pdf /tmp/build1.pdf

      - name: Clean and rebuild
        env:
          IS_OMNILATEX_CONTAINER: "true"
          CI: "true"
        run: |
          python3 build.py clean
          python3 build.py --mode prod --source-date-epoch 1700000000 build-example thesis

      - name: Verify bit-for-bit reproducibility
        run: |
          echo "Build 1 hash:"
          sha256sum /tmp/build1.pdf
          echo "Build 2 hash:"
          sha256sum build/examples/thesis.pdf
          diff <(sha256sum /tmp/build1.pdf) <(sha256sum build/examples/thesis.pdf)
          echo "SUCCESS: Builds are bit-for-bit identical"

      - name: Dump PDF metadata diff on mismatch
        if: failure()
        env:
          IS_OMNILATEX_CONTAINER: "true"
          CI: "true"
        run: |
          python3 -c "
          import fitz
          doc1 = fitz.open('/tmp/build1.pdf')
          doc2 = fitz.open('build/examples/thesis.pdf')
          print('=== Build 1 metadata ===')
          print(doc1.metadata)
          print('=== Build 2 metadata ===')
          print(doc2.metadata)
          "

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download root PDF
        uses: actions/download-artifact@v4
        with:
          name: PDF-Root
          path: .
      
      - name: Download example PDFs
        uses: actions/download-artifact@v4
        with:
          name: PDF-Examples
          path: build/examples
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install test dependencies
        working-directory: tests
        run: |
          poetry install --no-interaction
      
      - name: Run PDF tests
        working-directory: tests
        run: |
          poetry run pytest -v --tb=short
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/.pytest_cache
          retention-days: 7

  deploy-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md updated for .sty/.cls changes
        run: |
          # Get the list of changed .sty and .cls files vs the base branch
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.sty' '*.cls' 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "No .sty or .cls files changed — changelog check skipped."
            exit 0
          fi

          echo "Changed source files:"
          echo "$CHANGED"
          echo ""

          # Check if CHANGELOG.md was also modified
          CHANGELOG_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'CHANGELOG.md' 2>/dev/null || true)
          if [ -z "$CHANGELOG_CHANGED" ]; then
            echo "::error::.sty or .cls files were modified but CHANGELOG.md was not updated."
            echo "Please add an entry under [Unreleased] describing your changes."
            echo "See CONTRIBUTING.md for the changelog format."
            exit 1
          fi

          echo "CHANGELOG.md was updated."

