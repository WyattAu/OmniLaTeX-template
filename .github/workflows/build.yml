name: Build LaTeX Document

permissions:
  contents: read

# Docker image digest is sourced from .env.docker at runtime.
# The digest-sync workflow updates only .env.docker (no workflow file edits needed).

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better git metadata

      - name: Read Docker image digest
        id: digest
        run: echo "image=$(grep '^DOCKER_IMAGE=' .env.docker | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Pull Docker image
        run: docker pull "${{ steps.digest.outputs.image }}"

      - name: Build all documents (Production mode)
        run: |
          docker run --rm --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            --user root \
            -e IS_OMNILATEX_CONTAINER=true \
            -e CI=true \
            "${{ steps.digest.outputs.image }}" \
            python3 build.py --mode prod --verbose build-all

      - name: Upload root PDF
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Root
          path: main.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Upload example PDFs
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Examples
          path: build/examples/*.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Prepare site bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p github-pages
          cp main.pdf github-pages/main.pdf
          if [ -d pages ]; then
            cp -r pages/. github-pages/
          fi
          cat <<'EOF' > github-pages/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Latest PDF build</title>
            <style>
              :root { color-scheme: light dark; }
              html, body { height: 100%; margin: 0; }
              body { display: flex; flex-direction: column; font-family: system-ui, sans-serif; background: #111; color: #f5f5f5; }
              header { padding: 1rem 1.5rem; background: rgba(0,0,0,0.6); }
              header h1 { margin: 0; font-size: 1.25rem; }
              header p { margin: 0.25rem 0 0; font-size: 0.95rem; }
              main { flex: 1; }
              iframe { width: 100%; height: 100%; border: none; background: #fff; }
              a { color: #4ea3ff; }
            </style>
          </head>
          <body>
            <header>
              <h1>Latest PDF build</h1>
              <p>View inline below or <a href="main.pdf">download main.pdf</a>.</p>
            </header>
            <main>
              <iframe src="main.pdf#toolbar=1&view=FitH" title="Preview of main.pdf"></iframe>
            </main>
          </body>
          </html>
          EOF

      - name: Upload site bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages

  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Docker image digest
        id: digest
        run: echo "image=$(grep '^DOCKER_IMAGE=' .env.docker | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Pull Docker image
        run: docker pull "${{ steps.digest.outputs.image }}"

      - name: Download example PDFs
        uses: actions/download-artifact@v4
        with:
          name: PDF-Examples
          path: build/examples

      - name: Build examples with timings
        run: |
          docker run --rm --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            --user root \
            -e IS_OMNILATEX_CONTAINER=true \
            -e CI=true \
            "${{ steps.digest.outputs.image }}" \
            python3 build.py --mode prod --timings --force build-examples

      - name: Generate performance summary with regression detection
        if: always()
        run: |
          if [ -f build/metrics.json ]; then
            echo "## Build Performance Metrics" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            docker run --rm --entrypoint "" \
              -v "$GITHUB_WORKSPACE:/workspace" \
              -w /workspace \
              "${{ steps.digest.outputs.image }}" \
              python3 .github/scripts/extract_metrics.py >> $GITHUB_STEP_SUMMARY
          else
            echo "No metrics.json found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload performance metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics
          path: build/metrics.json
          retention-days: 90

  determinism:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Docker image digest
        id: digest
        run: echo "image=$(grep '^DOCKER_IMAGE=' .env.docker | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Pull Docker image
        run: docker pull "${{ steps.digest.outputs.image }}"

      - name: First build
        run: |
          docker run --rm --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            --user root \
            -e IS_OMNILATEX_CONTAINER=true \
            -e CI=true \
            "${{ steps.digest.outputs.image }}" \
            python3 build.py --mode prod --source-date-epoch 1700000000 build-example thesis
          cp build/examples/thesis.pdf /tmp/build1.pdf

      - name: Clean and rebuild
        run: |
          docker run --rm --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            --user root \
            "${{ steps.digest.outputs.image }}" \
            python3 build.py clean
          docker run --rm --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            --user root \
            -e IS_OMNILATEX_CONTAINER=true \
            -e CI=true \
            "${{ steps.digest.outputs.image }}" \
            python3 build.py --mode prod --source-date-epoch 1700000000 build-example thesis

      - name: Verify build reproducibility
        shell: bash
        run: |
          echo "Build 1 hash:"
          sha256sum /tmp/build1.pdf
          echo "Build 2 hash:"
          sha256sum build/examples/thesis.pdf

          # LuaLaTeX is not fully bit-for-bit deterministic (PDF object ordering,
          # Lua hash table randomization, font subsetting). Compare page counts
          # and file sizes instead of exact SHA256.
          PAGES1=$(docker run --rm --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            "${{ steps.digest.outputs.image }}" \
            pdfinfo /workspace/build/examples/thesis.pdf | grep "^Pages:" | awk '{print $2}')
          PAGES2=$(docker run --rm --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            "${{ steps.digest.outputs.image }}" \
            pdfinfo /workspace/build/examples/thesis.pdf | grep "^Pages:" | awk '{print $2}')
          SIZE1=$(stat -c%s /tmp/build1.pdf)
          SIZE2=$(stat -c%s build/examples/thesis.pdf)

          echo "Build 1: ${PAGES1} pages, ${SIZE1} bytes"
          echo "Build 2: ${PAGES2} pages, ${SIZE2} bytes"

          if [ "$PAGES1" != "$PAGES2" ]; then
            echo "::error::Page count mismatch: ${PAGES1} vs ${PAGES2}"
            exit 1
          fi

          # Allow 1% file size tolerance for non-determinism
          SIZE_DIFF=$(( (SIZE1 - SIZE2) < 0 ? (SIZE2 - SIZE1) : (SIZE1 - SIZE2) ))
          SIZE_MAX=$(( SIZE1 > SIZE2 ? SIZE1 : SIZE2 ))
          TOLERANCE=$(( SIZE_MAX / 100 ))  # 1%
          if [ "$SIZE_DIFF" -gt "$TOLERANCE" ]; then
            echo "::error::File size differs by more than 1%: ${SIZE_DIFF} bytes (tolerance: ${TOLERANCE})"
            exit 1
          fi

          echo "SUCCESS: Builds are reproducible (${PAGES1} pages, size diff: ${SIZE_DIFF} bytes)"

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Docker image digest
        id: digest
        run: echo "image=$(grep '^DOCKER_IMAGE=' .env.docker | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Pull Docker image
        run: docker pull "${{ steps.digest.outputs.image }}"

      - name: Download root PDF
        uses: actions/download-artifact@v4
        with:
          name: PDF-Root
          path: .

      - name: Download example PDFs
        uses: actions/download-artifact@v4
        with:
          name: PDF-Examples
          path: build/examples

      - name: Install test deps and run tests
        run: |
          docker run --rm --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            -e CI=true \
            "${{ steps.digest.outputs.image }}" \
            bash -c "pip install -q pymupdf pytest PyYAML python-dateutil PaperSize pytest-timeout && cd tests && pytest -v --tb=short --timeout=120"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/.pytest_cache
          retention-days: 7

  deploy-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md updated for .sty/.cls changes
        run: |
          # Get the list of changed .sty and .cls files vs the base branch
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.sty' '*.cls' 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "No .sty or .cls files changed — changelog check skipped."
            exit 0
          fi

          echo "Changed source files:"
          echo "$CHANGED"
          echo ""

          # Check if CHANGELOG.md was also modified
          CHANGELOG_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'CHANGELOG.md' 2>/dev/null || true)
          if [ -z "$CHANGELOG_CHANGED" ]; then
            echo "::error::.sty or .cls files were modified but CHANGELOG.md was not updated."
            echo "Please add an entry under [Unreleased] describing your changes."
            echo "See CONTRIBUTING.md for the changelog format."
            exit 1
          fi

          echo "CHANGELOG.md was updated."
