name: Build LaTeX Document

permissions:
  contents: read

# NOTE: GitHub Actions does NOT support env context in container.image.
# The Docker image digest is managed in .env.docker — update both files together.
# Image: ghcr.io/wyattau/omnilatex-docker@sha256:138f651baf0f53b6eb50317ce526c9fcff04e1ca1787bb478e93cfea4e4b88e2

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ghcr.io/wyattau/omnilatex-docker@sha256:138f651baf0f53b6eb50317ce526c9fcff04e1ca1787bb478e93cfea4e4b88e2
      options: --user root
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better git metadata
      
      - name: Build all documents (Production mode)
        env:
          IS_OMNILATEX_CONTAINER: "true"
          CI: "true"
        run: |
          python3 build.py --mode prod build-all
      
      - name: Upload root PDF
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Root
          path: main.pdf
          if-no-files-found: error
          retention-days: 30
      
      - name: Upload example PDFs
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Examples
          path: build/examples/*.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Prepare site bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p github-pages
          cp main.pdf github-pages/main.pdf
          if [ -d pages ]; then
            cp -r pages/. github-pages/
          fi
          cat <<'EOF' > github-pages/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Latest PDF build</title>
            <style>
              :root { color-scheme: light dark; }
              html, body { height: 100%; margin: 0; }
              body { display: flex; flex-direction: column; font-family: system-ui, sans-serif; background: #111; color: #f5f5f5; }
              header { padding: 1rem 1.5rem; background: rgba(0,0,0,0.6); }
              header h1 { margin: 0; font-size: 1.25rem; }
              header p { margin: 0.25rem 0 0; font-size: 0.95rem; }
              main { flex: 1; }
              iframe { width: 100%; height: 100%; border: none; background: #fff; }
              a { color: #4ea3ff; }
            </style>
          </head>
          <body>
            <header>
              <h1>Latest PDF build</h1>
              <p>View inline below or <a href="main.pdf">download main.pdf</a>.</p>
            </header>
            <main>
              <iframe src="main.pdf#toolbar=1&view=FitH" title="Preview of main.pdf"></iframe>
            </main>
          </body>
          </html>
          EOF

      - name: Upload site bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages
  
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    container:
      image: ghcr.io/wyattau/omnilatex-docker@sha256:138f651baf0f53b6eb50317ce526c9fcff04e1ca1787bb478e93cfea4e4b88e2
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download example PDFs
        uses: actions/download-artifact@v4
        with:
          name: PDF-Examples
          path: build/examples

      - name: Build examples with timings
        env:
          IS_OMNILATEX_CONTAINER: "true"
          CI: "true"
        run: |
          python3 build.py --mode prod --timings --force build-examples

      - name: Generate performance summary with regression detection
        if: always()
        run: |
          if [ -f build/metrics.json ]; then
            echo "## Build Performance Metrics" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python3 .github/scripts/extract_metrics.py >> $GITHUB_STEP_SUMMARY
          else
            echo "No metrics.json found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload performance metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics
          path: build/metrics.json
          retention-days: 90

  determinism:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/wyattau/omnilatex-docker@sha256:138f651baf0f53b6eb50317ce526c9fcff04e1ca1787bb478e93cfea4e4b88e2
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: First build
        env:
          IS_OMNILATEX_CONTAINER: "true"
          CI: "true"
        run: |
          python3 build.py --mode prod --source-date-epoch 1700000000 build-example thesis
          cp build/examples/thesis.pdf /tmp/build1.pdf

      - name: Clean and rebuild
        env:
          IS_OMNILATEX_CONTAINER: "true"
          CI: "true"
        run: |
          python3 build.py clean
          python3 build.py --mode prod --source-date-epoch 1700000000 build-example thesis

      - name: Verify bit-for-bit reproducibility
        shell: bash
        run: |
          echo "Build 1 hash:"
          sha256sum /tmp/build1.pdf
          echo "Build 2 hash:"
          sha256sum build/examples/thesis.pdf
          diff <(sha256sum /tmp/build1.pdf) <(sha256sum build/examples/thesis.pdf)
          echo "SUCCESS: Builds are bit-for-bit identical"

      - name: Dump PDF metadata diff on mismatch
        if: failure()
        shell: bash
        run: |
          echo "=== Build 1 metadata ==="
          python3 -c "
          import subprocess, json
          r = subprocess.run(['python3', '-m', 'markupsafe', '--version'], capture_output=True, text=True)
          print(r.stdout or r.stderr)
          " 2>/dev/null || true
          # Use pdfinfo (always available in TeX Live) instead of PyMuPDF
          echo "--- Build 1 ---"
          pdfinfo /tmp/build1.pdf 2>/dev/null || echo "pdfinfo not available"
          echo "--- Build 2 ---"
          pdfinfo build/examples/thesis.pdf 2>/dev/null || echo "pdfinfo not available"

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download root PDF
        uses: actions/download-artifact@v4
        with:
          name: PDF-Root
          path: .
      
      - name: Download example PDFs
        uses: actions/download-artifact@v4
        with:
          name: PDF-Examples
          path: build/examples
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install test dependencies
        working-directory: tests
        run: |
          poetry install --no-interaction
      
      - name: Run PDF tests
        working-directory: tests
        run: |
          poetry run pytest -v --tb=short
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/.pytest_cache
          retention-days: 7

  deploy-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md updated for .sty/.cls changes
        run: |
          # Get the list of changed .sty and .cls files vs the base branch
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.sty' '*.cls' 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "No .sty or .cls files changed — changelog check skipped."
            exit 0
          fi

          echo "Changed source files:"
          echo "$CHANGED"
          echo ""

          # Check if CHANGELOG.md was also modified
          CHANGELOG_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'CHANGELOG.md' 2>/dev/null || true)
          if [ -z "$CHANGELOG_CHANGED" ]; then
            echo "::error::.sty or .cls files were modified but CHANGELOG.md was not updated."
            echo "Please add an entry under [Unreleased] describing your changes."
            echo "See CONTRIBUTING.md for the changelog format."
            exit 1
          fi

          echo "CHANGELOG.md was updated."

