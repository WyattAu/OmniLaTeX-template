name: Docker Image CI/CD

on:
  push:
    branches: [main]
    tags: [v*]
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - '.dockerignore'
      - 'texmf/**'
      - 'config/fonts/**'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - '.dockerignore'
      - 'texmf/**'
      - 'config/fonts/**'
  workflow_dispatch:

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  CACHE_SCOPE: global-cache-v2
  PLATFORMS: linux/amd64,linux/arm64

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
    - name: Checkout Repository
      # v4
      uses: actions/checkout@v6

    - name: Set lowercase Image name
      id: set-image-name
      run: |
        echo "IMAGE_NAME=wyattau/omnilatex-docker" >> $GITHUB_ENV
    - name: Set up Docker Buildx
      id: buildx
      # v3
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      with:
        driver: docker-container
        driver-opts: |
          image=moby/buildkit:v0.29.0
          network=host
        buildkitd-config-inline: |
          [worker.oci]
            max-parallelism = 4
    - name: Set up QEMU
      # v3
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3
      if: env.PLATFORMS != 'linux/amd64'

    - name: Login to GitHub Container Registry
      # v3
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.repository_owner }}
        password: ${{ secrets.CR_PAT }}

    - name: Extract Docker metadata
      id: meta
      # v5
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
    - name: Build and push Docker image
      # v6
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
      with:
        context: .
        file: docker/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: ${{ env.PLATFORMS }}
        sbom: ${{ github.event_name != 'pull_request' }}
        provenance: ${{ github.event_name != 'pull_request' }}
        cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
        cache-to: type=gha,scope=${{ env.CACHE_SCOPE }},mode=max
        builder: ${{ steps.buildx.outputs.name }}
        build-args: |
          _BUILD_CONTEXT_PREFIX=docker
          USER=tex
          USER_ID=1000
          GROUP_ID=1000
          OMNILATEX_CLS_SHA256=${{ secrets.OMNILATEX_CLS_SHA256 }}

    - name: Inspect build cache
      if: always() && github.event_name != 'pull_request'
      run: |
        docker buildx du
        docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
