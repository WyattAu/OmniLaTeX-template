name: Docker Image CI/CD

on:
  push:
    branches: [main]
    tags: [v*]
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - '.dockerignore'
      - 'texmf/**'
      - 'config/fonts/**'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - '.dockerignore'
      - 'texmf/**'
      - 'config/fonts/**'

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  CACHE_SCOPE: global-cache-v2
  PLATFORMS: linux/amd64,linux/arm64

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
    - name: Checkout Repository
      # v4
      uses: actions/checkout@v6

    - name: Set lowercase Image name
      id: set-image-name
      run: |
        echo "IMAGE_NAME=wyattau/omnilatex-docker" >> $GITHUB_ENV
    - name: Set up Docker Buildx
      id: buildx
      # v3
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      with:
        driver: docker-container
        driver-opts: |
          image=moby/buildkit:v0.29.0
          network=host
        install: true
        buildkitd-config-inline: |
          [worker.oci]
            max-parallelism = 4
    - name: Set up QEMU
      # v3
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
      if: env.PLATFORMS != 'linux/amd64'

    - name: Login to GitHub Container Registry
      # v3
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.repository_owner }}
        password: ${{ secrets.CR_PAT }}

    - name: Extract Docker metadata
      id: meta
      # v5
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
    - name: Build and push Docker image
      # v6
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
      with:
        context: .
        file: docker/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: ${{ env.PLATFORMS }}
        sbom: ${{ github.event_name != 'pull_request' }}
        provenance: ${{ github.event_name != 'pull_request' }}
        cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
        cache-to: type=gha,scope=${{ env.CACHE_SCOPE }},mode=max
        builder: ${{ steps.buildx.outputs.name }}
        build-args: |
          _BUILD_CONTEXT_PREFIX=docker
          USER=tex
          USER_ID=1000
          GROUP_ID=1000
          OMNILATEX_CLS_SHA256=${{ secrets.OMNILATEX_CLS_SHA256 }}

    - name: Inspect build cache
      if: always() && github.event_name != 'pull_request'
      run: |
        docker buildx du
        docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
