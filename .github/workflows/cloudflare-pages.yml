name: Deploy Docs (Cloudflare Pages)

# Deploy documentation to Cloudflare Pages.
# For Forgejo-hosted repositories only. GitHub repos use docs.yml (GitHub Pages).
# Manually triggered via workflow_dispatch on Forgejo.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    # v4
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 1
    - uses: ./.github/actions/setup-python
    - run: pip install -r docs/requirements.txt
    - run: mkdocs build

    - name: Merge pages/ gallery into site
      run: |
        if [ -d pages ]; then
          for f in pages/*.html pages/*.css; do
            fname=$(basename "$f")
            if [ "$fname" = "index.html" ]; then
              cp "$f" "site/gallery-app.html"
            else
              cp "$f" "site/$fname"
            fi
          done
          sed -i 's|href="index\.html"|href="gallery-app.html"|g' site/gallery-app.html site/gallery.html site/verify.html
        fi

    - name: Download PDFs from build-examples workflow
      continue-on-error: true
      run: |
        RUN_ID=$(gh run list -w "Build Examples" -b main --status success -L 1 --json databaseId -q '.[0].databaseId') || true
        if [ -n "$RUN_ID" ]; then
          mkdir -p site/pdfs
          gh run download "$RUN_ID" -D /tmp/pdf-artifacts || true
          find /tmp/pdf-artifacts -name '*.pdf' -exec cp {} site/pdfs/ \;
          rm -rf /tmp/pdf-artifacts
          echo "Downloaded $(ls site/pdfs/*.pdf 2>/dev/null | wc -l) PDFs"
        else
          echo "No successful build-examples run found, skipping PDF download"
        fi

    - name: Create Cloudflare _headers file
      run: |
        cat > site/_headers << 'EOF'
        /*
          Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' api.github.com
          X-Content-Type-Options: nosniff
          Referrer-Policy: strict-origin-when-cross-origin

        /*.html
          X-Frame-Options: DENY
          Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' api.github.com; frame-ancestors 'none'

        /pdfs/*
          Content-Disposition: inline
          Cache-Control: public, max-age=86400
          X-Content-Type-Options: nosniff
        EOF

    - name: Deploy to Cloudflare Pages
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      run: |
        # GitHub Actions: secrets are injected via env above.
        # Forgejo/local: source .env (gitignored) if secrets are empty.
        if [ -z "$CLOUDFLARE_API_TOKEN" ] && [ -f .env ]; then
          set -a; source .env; set +a
        fi
        : "${CLOUDFLARE_API_TOKEN:?'CLOUDFLARE_API_TOKEN is required'}"
        npx wrangler@3.99.0 pages deploy site/ \
          --project-name=omnilatex-docs \
          --commit-dirty=true
