name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
    - web/**
    - docs/**
    - .github/workflows/cloudflare-pages.yml
  workflow_dispatch:
  workflow_run:
    workflows: [Deploy Docs]
    types: [completed]
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      working-directory: web
      run: npm ci

    - name: Build Astro site (no base path)
      working-directory: web
      env:
        CLOUDFLARE_DEPLOY: '1'
      run: npm run build

    - name: Download PDFs from build-examples workflow
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        RUN_ID=$(gh run list -w "Build Examples" -b main --status success -L 1 --json databaseId -q '.[0].databaseId' 2>/dev/null) || true
        if [ -n "$RUN_ID" ]; then
          mkdir -p web/dist/pdfs
          gh run download "$RUN_ID" -D /tmp/pdf-artifacts 2>/dev/null || true
          find /tmp/pdf-artifacts -name '*.pdf' -exec cp {} web/dist/pdfs/ \;
          rm -rf /tmp/pdf-artifacts
          echo "Downloaded $(ls web/dist/pdfs/*.pdf 2>/dev/null | wc -l) PDFs"
        else
          echo "No successful build-examples run found, skipping PDF download"
        fi

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy web/dist --project-name=omnilatex-docs
