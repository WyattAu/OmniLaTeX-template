name: Visual Regression

permissions:
  contents: read

concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
    paths:
    - '**.tex'
    - '**.sty'
    - '**.cls'
    - '**.lua'
  pull_request:
    branches: [main, master]
    paths:
    - '**.tex'
    - '**.sty'
    - '**.cls'
    - '**.lua'
  workflow_dispatch:
    inputs:
      regenerate:
        description: Regenerate reference PDFs
        required: false
        default: 'false'
        type: choice
        options:
        - 'false'
        - 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Cache built PDFs
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: |
          build/examples/*.pdf
          main.pdf
        key: v1-visual-regression-${{ hashFiles('**.tex', '**.sty', '**.cls', '**.lua') }}
        restore-keys: |
          v1-visual-regression-

    - name: Build examples
      run: |
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          --user root \
          -e IS_OMNILATEX_CONTAINER=true \
          -e CI=true \
          "${{ steps.digest.outputs.image }}" \
          python3 build.py --mode prod build-examples

    - name: Upload built PDFs
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: visual-regression-pdfs
        path: |
          build/examples/*.pdf
          main.pdf
        retention-days: 14

  diff:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.regenerate != 'true'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Download built PDFs
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: visual-regression-pdfs
        path: .

    - name: Check for reference PDFs
      id: refs
      run: |
        if ls tests/references/*.pdf 1>/dev/null 2>&1; then
          echo "has_refs=true" >> $GITHUB_OUTPUT
        else
          echo "has_refs=false" >> $GITHUB_OUTPUT
          echo "No reference PDFs found in tests/references/ -- skipping diff."
        fi

    - name: Copy references into build dir for comparison
      if: steps.refs.outputs.has_refs == 'true'
      run: mkdir -p build/references && cp tests/references/*.pdf build/references/

    - name: Run visual regression diff
      if: steps.refs.outputs.has_refs == 'true'
      run: |
        EXAMPLES=$(ls build/examples/*.pdf 2>/dev/null | xargs -I{} basename {} .pdf | tr '\n' ' ')
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          --user root \
          -e CI=true \
          "${{ steps.digest.outputs.image }}" \
          python3 build.py diff $EXAMPLES

  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.regenerate == 'true'
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Download built PDFs
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: visual-regression-pdfs
        path: .

    - name: Regenerate reference PDFs
      run: |
        mkdir -p tests/references
        cp build/examples/*.pdf tests/references/

    - name: Create pull request for updated references
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
      with:
        branch: chore/update-visual-references
        title: 'chore: update visual regression reference PDFs'
        add-paths: |
          tests/references/*.pdf
        delete-branch: true
