name: Lean 4 Proofs

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      # v4
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 0

    - name: Install Nix
      # v16
      uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d

    - name: Setup Nix cache
      # v8
      uses: DeterminateSystems/magic-nix-cache-action@87b14cf437d03d37989d87f0fa5ce4f5dc1a330b

    - name: Build Lean 4 proofs
      run: |
        nix develop --command bash -c "
          cd specs/proofs
          lake build
        "

    - name: Verify proof status
      if: always()
      run: |
        echo "## Lean 4 Proof Verification" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if grep -rq 'sorry' specs/proofs/; then
          echo ':warning: Some proofs contain \`sorry\` (unproven theorems)' >> $GITHUB_STEP_SUMMARY
          echo 'This is expected for work-in-progress proofs.' >> $GITHUB_STEP_SUMMARY
        else
          echo ':white_check_mark: All proofs compile without errors' >> $GITHUB_STEP_SUMMARY
        fi
        echo '' >> $GITHUB_STEP_SUMMARY
        echo '| Module | Status |' >> $GITHUB_STEP_SUMMARY
        echo '|--------|--------|' >> $GITHUB_STEP_SUMMARY
        for f in BuildModes BuildModeStrictness BuildSystem DoctypeClassMapping DoctypePageGeometry DocumentSettings DoctypeResolution CrossReferenceConsistency FloatInvariant FontHierarchy I18nCompleteness LanguageFallback PageGeometry SecondaryLanguageCompleteness BeamerProperties ModuleIntegrity; do
          if [ -f "specs/proofs/OmniLaTeXProofs/$f.lean" ]; then
            echo "| \`$f\` | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| \`$f\` | :x: |" >> $GITHUB_STEP_SUMMARY
          fi
        done
