name: Lean 4 Proofs

permissions:
  contents: read

concurrency:
  group: lean4-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      # v4
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 0

    - name: Install Nix
      # v16
      uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d

    - name: Setup Nix cache
      # v8
      uses: DeterminateSystems/magic-nix-cache-action@87b14cf437d03d37989d87f0fa5ce4f5dc1a330b

    - name: Build Lean 4 proofs
      run: |
        START_TIME=$(date +%s%N)
        nix develop --command bash -c "
          cd specs/proofs
          lake build
        "
        END_TIME=$(date +%s%N)
        ELAPSED_NS=$(( END_TIME - START_TIME ))
        ELAPSED_SEC=$(( ELAPSED_NS / 1000000000 ))
        ELAPSED_REM=$(( (ELAPSED_NS % 1000000000) / 1000000 ))
        printf -v LAKE_BUILD_SECONDS '%d.%03d' "$ELAPSED_SEC" "$ELAPSED_REM"
        echo "LAKE_BUILD_SECONDS=${LAKE_BUILD_SECONDS}" >> $GITHUB_ENV
        echo "::notice::lake build completed in ${LAKE_BUILD_SECONDS}s"

    - name: Check proof timing regression
      run: |
        BASELINE_FILE="specs/proofs/.timing_baseline"
        CURRENT="${LAKE_BUILD_SECONDS}"
        TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

        if [ ! -f "$BASELINE_FILE" ]; then
          echo "# Lean 4 Proof Timing Baseline (seconds)" > "$BASELINE_FILE"
          echo "# Last updated: ${TIMESTAMP}" >> "$BASELINE_FILE"
          echo "${CURRENT}" >> "$BASELINE_FILE"
          echo "::notice::Created timing baseline: ${CURRENT}s"
          exit 0
        fi

        BASELINE=$(sed -n '/^[0-9]/p' "$BASELINE_FILE" | head -1)
        THRESHOLD=$(echo "$BASELINE * 1.2" | bc -l)
        REGRESSION=$(echo "$CURRENT >= $THRESHOLD" | bc -l)

        echo "Baseline: ${BASELINE}s | Current: ${CURRENT}s | Threshold (120%): ${THRESHOLD}s"

        if [ "$REGRESSION" -eq 1 ] 2>/dev/null; then
          echo "::warning::Proof verification regression detected: ${CURRENT}s vs ${BASELINE}s baseline (>=20% slower)"
          echo "## :warning: Timing Regression" >> $GITHUB_STEP_SUMMARY
          echo "Proof verification took **${CURRENT}s** vs ${BASELINE}s baseline (>=20% slower)" >> $GITHUB_STEP_SUMMARY
        else
          echo "No timing regression detected."
        fi

        echo "# Lean 4 Proof Timing Baseline (seconds)" > "$BASELINE_FILE"
        echo "# Last updated: ${TIMESTAMP}" >> "$BASELINE_FILE"
        echo "${CURRENT}" >> "$BASELINE_FILE"

    - name: Verify proof status
      if: always()
      run: |
        echo "## Lean 4 Proof Verification" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if grep -rq 'sorry' specs/proofs/; then
          echo ':warning: Some proofs contain \`sorry\` (unproven theorems)' >> $GITHUB_STEP_SUMMARY
          echo 'This is expected for work-in-progress proofs.' >> $GITHUB_STEP_SUMMARY
        else
          echo ':white_check_mark: All proofs compile without errors' >> $GITHUB_STEP_SUMMARY
        fi
        echo '' >> $GITHUB_STEP_SUMMARY
        echo '| Module | Status |' >> $GITHUB_STEP_SUMMARY
        echo '|--------|--------|' >> $GITHUB_STEP_SUMMARY
        for f in BuildModes BuildModeStrictness BuildSystem DoctypeClassMapping DoctypePageGeometry DocumentSettings DoctypeResolution CrossReferenceConsistency FloatInvariant FontHierarchy I18nCompleteness LanguageFallback PageGeometry SecondaryLanguageCompleteness BeamerProperties ModuleIntegrity; do
          if [ -f "specs/proofs/OmniLaTeXProofs/$f.lean" ]; then
            echo "| \`$f\` | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| \`$f\` | :x: |" >> $GITHUB_STEP_SUMMARY
          fi
        done

  proof-gate:
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Check for sorry in proofs
      run: |
        if grep -rq 'sorry' specs/proofs/; then
          echo "::error::Proofs contain 'sorry' — unproven theorems block merge"
          grep -rn 'sorry' specs/proofs/ | head -20
          exit 1
        fi
        echo "No sorry found — all proofs are complete"
