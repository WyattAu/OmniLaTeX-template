name: Sync Docker Digest

on:
  workflow_run:
    workflows: [Docker Image CI/CD]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Resolve image reference
      id: resolve-image
      run: |
        echo "image_ref=ghcr.io/wyattau/omnilatex-docker:latest" >> $GITHUB_OUTPUT

    - name: Get new image digest
      id: digest
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.CR_PAT }}

    - name: Pull image and extract digest
      id: pull-digest
      env:
        IMAGE_REF: ${{ steps.resolve-image.outputs.image_ref }}
      run: |
        docker pull "${IMAGE_REF}"
        DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_REF}" | sed 's/.*@//')
        echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
        echo "Image digest: ${DIGEST}"

    - name: Update digest in .env.docker
      id: update-digest
      env:
        NEW_DIGEST: ${{ steps.pull-digest.outputs.digest }}
      run: |
        OLD_DIGEST=$(grep -oP 'sha256:[a-f0-9]+' .env.docker | head -1)
        if [ "${OLD_DIGEST}" = "${NEW_DIGEST}" ]; then
          echo "Digest already up to date, skipping."
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "Updating digest: ${OLD_DIGEST} -> ${NEW_DIGEST}"
          sed -i "s|${OLD_DIGEST}|${NEW_DIGEST}|g" .env.docker
          TODAY=$(date +%Y-%m-%d)
          sed -i "s|# Pinned digest (.*)|# Pinned digest (${TODAY})|" .env.docker
          echo "skip=false" >> $GITHUB_OUTPUT

          sed -i "s|${OLD_DIGEST}|${NEW_DIGEST}|g" .gitlab/ci/pipeline.yml
          sed -i "s|${OLD_DIGEST}|${NEW_DIGEST}|g" .gitea/workflows/build.yml
          sed -i "s|${OLD_DIGEST}|${NEW_DIGEST}|g" .forgejo/workflows/build.yml
          sed -i "s|${OLD_DIGEST}|${NEW_DIGEST}|g" .woodpecker/workflows/pipeline.yml
          sed -i "s|${OLD_DIGEST}|${NEW_DIGEST}|g" .devcontainer/docker-compose.yml
          echo "Synced digest to all downstream CI files."
        fi

    - name: Create pull request
      if: steps.update-digest.outputs.skip != 'true'
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
      env:
        PR_DIGEST: ${{ steps.pull-digest.outputs.digest }}
      with:
        title: 'chore: update Docker image digest'
        body: |
          Automated digest sync from [Docker Image CI/CD](${{ github.event.workflow_run.html_url }}).

          This PR updates the pinned Docker image digest in:
          - `.env.docker`
          - `.gitlab/ci/pipeline.yml`
          - `.gitea/workflows/build.yml`
          - `.forgejo/workflows/build.yml`
          - `.woodpecker/workflows/pipeline.yml`
          - `.devcontainer/docker-compose.yml`
        branch: chore/docker-digest-sync
        commit-message: 'chore: update Docker image digest'
        delete-branch: true
        labels: automation
