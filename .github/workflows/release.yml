# .github/workflows/release.yml
# Auto-publish GitHub Release with assets on tag push (vX.Y.Z)
name: Release

on:
  push:
    tags:
    - v[0-9]+.[0-9]+.[0-9]+
    - v[0-9]+.[0-9]+.[0-9]+-*

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Extract version from tag
      id: version
      run: |
        TAG="${GITHUB_REF_NAME}"
        VERSION="${TAG#v}"
        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Read changelog
      id: changelog
      run: |
        CHANGELOG_FILE="CHANGELOG/${GITHUB_REF_NAME}.md"
        if [ -f "$CHANGELOG_FILE" ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          # Use multiline output
          {
            echo "content<<CHANGELOG_EOF"
            cat "$CHANGELOG_FILE"
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "content=Release ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
        fi

    - name: Generate CTAN zip
      run: |
        chmod +x scripts/make-ctan-zip.sh
        scripts/make-ctan-zip.sh

    - name: Generate Overleaf zip
      run: |
        chmod +x scripts/make-overleaf-zip.sh
        scripts/make-overleaf-zip.sh

    - name: Create release archive
      run: |
        ARCHIVE="/tmp/omnilatex-${{ steps.version.outputs.version }}.tar.gz"
        tar czf "$ARCHIVE" \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='__pycache__' \
          --exclude='.pytest_cache' \
          --exclude='.hypothesis' \
          --exclude='*.pdf' \
          --exclude='build/' \
          --exclude='main.aux' \
          --exclude='main.log' \
          --exclude='main.out' \
          --exclude='main.toc' \
          --exclude='main.fls' \
          --exclude='main.fdb_latexmk' \
          --exclude='.vscode' \
          .
        cp "$ARCHIVE" "omnilatex-${{ steps.version.outputs.version }}.tar.gz"

    - name: Verify release assets
      run: |
        echo "=== Release Assets ==="
        ls -lh ctan/omnilatex.zip omnilatex-overleaf.zip "omnilatex-${{ steps.version.outputs.version }}.tar.gz"
        echo ""
        echo "=== CTAN zip contents (sample) ==="
        unzip -l ctan/omnilatex.zip | head -20
        echo ""
        echo "=== Overleaf zip contents (sample) ==="
        unzip -l omnilatex-overleaf.zip | head -20

    - name: Create GitHub Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda   # v3.0.0
      env:
        RELEASE_BODY: ${{ steps.changelog.outputs.content }}
      with:
        tag_name: ${{ github.ref_name }}
        name: OmniLaTeX ${{ github.ref_name }}
        body: ${{ env.RELEASE_BODY }}
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') }}
        files: |
          ctan/omnilatex.zip
          omnilatex-overleaf.zip
          omnilatex-${{ steps.version.outputs.version }}.tar.gz
        fail_on_unmatched_files: true
