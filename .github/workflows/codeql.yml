name: "CodeQL Security Analysis"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
  - cron: "0 6 * * 1"

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: javascript-typescript
          build-mode: none
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Initialize CodeQL
      uses: github/codeql-action/init@1a818fd5f97ed0ee9a823421bd5b171add01227f
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@1a818fd5f97ed0ee9a823421bd5b171add01227f

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@1a818fd5f97ed0ee9a823421bd5b171add01227f
      with:
        category: "/language:${{ matrix.language }}"
