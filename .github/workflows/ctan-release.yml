name: CTAN Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zip

      - name: Build CTAN zip
        run: bash scripts/make-ctan-zip.sh

      - name: Validate CTAN zip
        run: |
          test -f omnilatex.zip || { echo "::error::omnilatex.zip not found"; exit 1; }
          test -s omnilatex.zip || { echo "::error::omnilatex.zip is empty"; exit 1; }
          unzip -l omnilatex.zip | grep -q 'omnilatex\.cls$' || { echo "::error::omnilatex.cls missing"; exit 1; }
          echo "CTAN zip validated OK"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: omnilatex.zip
          generate_release_notes: true

      - name: Upload CTAN zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctan-package
          path: omnilatex.zip
          retention-days: 90
