name: SBOM Compliance Tracking

on:
  push:
    branches: [main]
    paths:
    - requirements*.txt
    - pyproject.toml
    - package.json
    - docker/Dockerfile
  schedule:
  - cron: 0 0 * * 1
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Generate SBOM and scan for vulnerabilities
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
      with:
        format: spdx-json
        output-file: sbom.spdx.json
        artifact-name: sbom-spdx
        upload-artifact: true
        scan: true

    - name: Check for critical vulnerabilities
      id: vuln_check
      run: |
        if [ -f sbom.spdx.json ]; then
          echo "SBOM generated successfully"
          echo "size=$(wc -c < sbom.spdx.json)" >> "$GITHUB_OUTPUT"
        else
          echo "Warning: SBOM file not found"
        fi

    - name: Create issue on critical findings
      if: failure()
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
      with:
        script: |
          const title = 'SBOM: Critical vulnerabilities detected';
          const body = `Weekly SBOM scan found critical vulnerabilities.\n\nRun: ${context.runId}\nWorkflow: ${context.workflow}\nDate: ${new Date().toISOString()}\n\nPlease review the SBOM scan results and update affected dependencies.`;
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'security,sbom',
            per_page: 1
          });
          if (issues.data.length === 0) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'sbom']
            });
          }
