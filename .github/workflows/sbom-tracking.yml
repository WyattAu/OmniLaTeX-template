name: SBOM Compliance Tracking

on:
  push:
    branches: [main]
    paths:
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'package.json'
      - 'Dockerfile'
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom-spdx
          upload-artifact: true

      - name: Vulnerability scan
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          scan: true
          artifact-name: sbom-spdx

      - name: Check for critical vulnerabilities
        id: vuln_check
        run: |
          if [ -f sbom.spdx.json ]; then
            echo "SBOM generated successfully"
            echo "size=$(wc -c < sbom.spdx.json)" >> "$GITHUB_OUTPUT"
          else
            echo "Warning: SBOM file not found"
          fi

      - name: Create issue on critical findings
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c379a5d4a
        with:
          script: |
            const title = 'SBOM: Critical vulnerabilities detected';
            const body = `Weekly SBOM scan found critical vulnerabilities.\n\nRun: ${context.runId}\nWorkflow: ${context.workflow}\nDate: ${new Date().toISOString()}\n\nPlease review the SBOM scan results and update affected dependencies.`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,sbom',
              per_page: 1
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'sbom']
              });
            }
