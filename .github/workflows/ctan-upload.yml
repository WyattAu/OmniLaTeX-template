name: CTAN Upload

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ctan-upload-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Pre-flight: validate everything before attempting upload ────────────
  pre-flight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      # v4
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Install dependencies
      run: sudo apt-get update -qq && sudo apt-get install -y -qq zip unzip jq

    - name: Build CTAN zip
      run: bash scripts/make-ctan-zip.sh

    - name: Validate CTAN zip contents
      run: |
        test -f ctan/omnilatex.zip
        test -s ctan/omnilatex.zip
        unzip -l ctan/omnilatex.zip | grep -q 'omnilatex\.tds\.zip' || { echo "::error::TDS zip missing"; exit 1; }
        unzip -l ctan/omnilatex.zip | grep -qiE '(README$)'         || { echo "::warning::README missing"; }
        unzip -l ctan/omnilatex.zip | grep -qiE '(LICENSE)'         || { echo "::warning::LICENSE missing"; }
        echo "CTAN zip validated"

    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Generate changelog
      id: changelog
      run: |
        CURRENT="${GITHUB_REF_NAME}"
        PREV=$(git tag --sort=-version:refname | grep -v "^${CURRENT}$" | head -1 || true)
        if [ -n "$PREV" ]; then
          LOG=$(git log --oneline "${PREV}..${CURRENT}")
        else
          LOG=$(git log --oneline -20)
        fi
        # Escape for multiline output
        {
          echo "changelog<<EOF"
          echo "${LOG:-Release ${CURRENT}}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Dry-run upload (pre-flight validation)
      env:
        CTAN_EMAIL: ${{ secrets.CTAN_EMAIL }}
        CTAN_AUTHOR: ${{ secrets.CTAN_AUTHOR }}
      run: |
        if [ -z "$CTAN_EMAIL" ]; then
          echo "::error::CTAN_EMAIL secret is not set"
          exit 1
        fi
        bash scripts/ctan-upload.sh \
          "${{ steps.version.outputs.version }}" \
          ctan/omnilatex.zip \
          --dry-run \
          --changelog "${{ steps.changelog.outputs.changelog }}"

    - name: Upload CTAN zip artifact
      # v4
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: ctan-zip
        path: ctan/omnilatex.zip
        retention-days: 1

  # ── Upload: only runs if pre-flight passes ──────────────────────────────
  upload:
    needs: pre-flight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout Repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install dependencies
      run: sudo apt-get update -qq && sudo apt-get install -y -qq unzip

    - name: Download CTAN zip artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      with:
        name: ctan-zip
        path: ctan

    - name: Validate downloaded zip
      run: |
        test -f ctan/omnilatex.zip || { echo "::error::Downloaded zip not found"; exit 1; }
        test -s ctan/omnilatex.zip || { echo "::error::Downloaded zip is empty"; exit 1; }

    - name: Upload to CTAN
      env:
        CTAN_EMAIL: ${{ secrets.CTAN_EMAIL }}
        CTAN_AUTHOR: ${{ secrets.CTAN_AUTHOR }}
      run: |
        bash scripts/ctan-upload.sh \
          "${{ needs.pre-flight.outputs.version }}" \
          ctan/omnilatex.zip \
          --changelog "${{ needs.pre-flight.outputs.changelog }}"
