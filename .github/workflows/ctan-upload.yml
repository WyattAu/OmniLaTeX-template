name: CTAN Upload

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ctan-upload-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Pre-flight: validate everything before attempting upload ────────────
  pre-flight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      # v4
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Install dependencies
      run: sudo apt-get update -qq && sudo apt-get install -y -qq zip unzip jq

    - name: Build CTAN zip
      run: bash scripts/make-ctan-zip.sh

    - name: Validate CTAN zip contents
      run: |
        test -f ctan/omnilatex.zip
        test -s ctan/omnilatex.zip
        unzip -l ctan/omnilatex.zip | grep -q 'omnilatex\.cls'   || { echo "::error::omnilatex.cls missing"; exit 1; }
        unzip -l ctan/omnilatex.zip | grep -qiE '(README\.md)'    || { echo "::warning::README.md missing"; }
        unzip -l ctan/omnilatex.zip | grep -qiE '(LICENSE)'       || { echo "::warning::LICENSE missing"; }
        unzip -l ctan/omnilatex.zip | grep -q 'doc/omnilatex-doc\.pdf' || { echo "::error::doc/omnilatex-doc.pdf missing"; exit 1; }
        echo "CTAN zip validated"

    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Generate changelog (human-readable announcement)
      id: changelog
      run: |
        CHANGELOG="OmniLaTeX v${GITHUB_REF_NAME#v}: A modular KOMA-Script document class for LuaLaTeX.
        Supports multiple document types (thesis, article, CV, presentation, poster, letter,
        and more), institutional configurations, and multi-language output via polyglossia.
        CI-tested on TeX Live. Docker and Nix reproducible builds available.
        See https://github.com/WyattAu/OmniLaTeX-template for full documentation."
        {
          echo "changelog<<EOF"
          echo "$CHANGELOG"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Dry-run upload (pre-flight validation)
      env:
        CTAN_EMAIL: ${{ secrets.CTAN_EMAIL }}
        CTAN_AUTHOR: ${{ secrets.CTAN_AUTHOR }}
      run: |
        bash scripts/ctan-upload.sh \
          "${{ steps.version.outputs.version }}" \
          ctan/omnilatex.zip \
          --dry-run \
          --changelog "${{ steps.changelog.outputs.changelog }}"

    - name: Upload CTAN zip artifact
      # v4
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: ctan-zip
        path: ctan/omnilatex.zip
        retention-days: 1

  # ── Upload: only runs if pre-flight passes ──────────────────────────────
  upload:
    needs: pre-flight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Install dependencies
      run: sudo apt-get update -qq && sudo apt-get install -y -qq unzip

    - name: Download CTAN zip artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      with:
        name: ctan-zip
        path: ctan

    - name: Validate downloaded zip
      run: |
        test -f ctan/omnilatex.zip || { echo "::error::Downloaded zip not found"; exit 1; }
        test -s ctan/omnilatex.zip || { echo "::error::Downloaded zip is empty"; exit 1; }

    - name: Upload to CTAN
      env:
        CTAN_EMAIL: ${{ secrets.CTAN_EMAIL }}
        CTAN_AUTHOR: ${{ secrets.CTAN_AUTHOR }}
      run: |
        bash scripts/ctan-upload.sh \
          "${{ needs.pre-flight.outputs.version }}" \
          ctan/omnilatex.zip \
          --changelog "${{ needs.pre-flight.outputs.changelog }}"
