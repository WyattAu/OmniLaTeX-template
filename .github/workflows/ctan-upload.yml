name: CTAN Upload

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # ── Pre-flight: validate everything before attempting upload ────────────
  pre-flight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zip unzip jq

      - name: Build CTAN zip
        run: bash scripts/make-ctan-zip.sh

      - name: Validate CTAN zip contents
        run: |
          test -f omnilatex.zip
          test -s omnilatex.zip
          unzip -l omnilatex.zip | grep -q 'omnilatex\.cls$'  || { echo "::error::omnilatex.cls missing"; exit 1; }
          unzip -l omnilatex.zip | grep -qiE '(README\.md|README$)' || { echo "::warning::README.md missing"; }
          unzip -l omnilatex.zip | grep -qiE '(LICENSE|COPYING)'   || { echo "::warning::LICENSE missing"; }
          echo "✓ CTAN zip validated"

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-version:refname | grep -v "^${CURRENT}$" | head -1 || true)
          if [ -n "$PREV" ]; then
            LOG=$(git log --oneline "${PREV}..${CURRENT}")
          else
            LOG=$(git log --oneline -20)
          fi
          # Escape for multiline output
          {
            echo "changelog<<EOF"
            echo "${LOG:-Release ${CURRENT}}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Dry-run upload (pre-flight validation)
        env:
          CTAN_EMAIL: ${{ secrets.CTAN_EMAIL }}
          CTAN_AUTHOR: ${{ secrets.CTAN_AUTHOR }}
        run: |
          if [ -z "$CTAN_EMAIL" ]; then
            echo "::error::CTAN_EMAIL secret is not set"
            exit 1
          fi
          bash scripts/ctan-upload.sh \
            "${{ steps.version.outputs.version }}" \
            omnilatex.zip \
            --dry-run \
            --changelog "${{ steps.changelog.outputs.changelog }}"

  # ── Upload: only runs if pre-flight passes ──────────────────────────────
  upload:
    needs: pre-flight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zip unzip jq

      - name: Build CTAN zip
        run: bash scripts/make-ctan-zip.sh

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-version:refname | grep -v "^${CURRENT}$" | head -1 || true)
          if [ -n "$PREV" ]; then
            LOG=$(git log --oneline "${PREV}..${CURRENT}")
          else
            LOG=$(git log --oneline -20)
          fi
          {
            echo "changelog<<EOF"
            echo "${LOG:-Release ${CURRENT}}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to CTAN
        env:
          CTAN_EMAIL: ${{ secrets.CTAN_EMAIL }}
          CTAN_AUTHOR: ${{ secrets.CTAN_AUTHOR }}
        run: |
          bash scripts/ctan-upload.sh \
            "${{ needs.pre-flight.outputs.version }}" \
            omnilatex.zip \
            --changelog "${{ steps.changelog.outputs.changelog }}"
