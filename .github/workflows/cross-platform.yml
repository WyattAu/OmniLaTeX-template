name: Cross-Platform Docker CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: cross-platform-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_PLATFORM: linux/amd64

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout repository
        # v4
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 1

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Build article example
      env:
        IS_OMNILATEX_CONTAINER: 'true'
        CI: 'true'
      run: |
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          -u root \
          -e IS_OMNILATEX_CONTAINER=true \
          -e CI=true \
          "${{ steps.digest.outputs.image }}" \
          python3 build.py --mode prod build-example article

    - name: Verify PDF
      run: |
        test -f build/examples/article.pdf && echo "✅ PDF generated" || (echo "❌ PDF not found" && exit 1)

  windows-experimental:
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true  # Known limitation: Docker Desktop not available on windows-2025
    steps:
    - name: Checkout repository
        # v4
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Build article example
      shell: bash
      env:
        IS_OMNILATEX_CONTAINER: 'true'
        CI: 'true'
      run: |
        DOCKER_TAG=$(grep '^DOCKER_IMAGE_VERSION=' .env.docker | cut -d= -f2)
        if [ -z "$DOCKER_TAG" ]; then
          echo "::error::.env.docker missing or DOCKER_IMAGE_VERSION not set"
          exit 1
        fi
        # Windows Docker: use multi-arch tag instead of architecture-specific digest
        IMAGE="ghcr.io/wyattau/omnilatex-docker:${DOCKER_TAG}"
        docker run --rm --entrypoint "" \
          --platform linux/amd64 \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          -e IS_OMNILATEX_CONTAINER=true \
          -e CI=true \
          "$IMAGE" \
          python3 build.py --mode prod build-example article

    - name: Verify PDF
      shell: bash
      if: success()
      run: |
        test -f build/examples/article.pdf && echo "✅ PDF generated" || (echo "❌ PDF not found" && exit 1)

  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [linux, windows-experimental]
    if: always()
    steps:
    - name: Cross-platform summary
      run: |
        echo "## Cross-Platform Docker CI Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Linux    | ${{ needs.linux.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Windows  | ${{ needs.windows-experimental.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
