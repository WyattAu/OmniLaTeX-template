name: Cross-Platform Docker CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  DOCKER_IMAGE: ghcr.io/wyattau/omnilatex-docker:latest
  DOCKER_PLATFORM: linux/amd64

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull Docker image
        run: docker pull ${{ env.DOCKER_IMAGE }}

      - name: Build article example
        env:
          IS_OMNILATEX_CONTAINER: "true"
          CI: "true"
        run: |
          docker run --rm --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            -u root \
            -e IS_OMNILATEX_CONTAINER=true \
            -e CI=true \
            ${{ env.DOCKER_IMAGE }} \
            python3 build.py --mode prod build-example article

      - name: Verify PDF
        run: |
          test -f build/examples/article.pdf && echo "✅ PDF generated" || (echo "❌ PDF not found" && exit 1)

  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build article example via WSL
        shell: bash
        env:
          IS_OMNILATEX_CONTAINER: "true"
          CI: "true"
        run: |
          # Docker Engine on windows-2025 runners may not support --platform
          # for multi-arch images directly. Use WSL which provides native
          # Linux container support.
          if command -v wsl &>/dev/null && wsl --list &>/dev/null; then
            echo "Using WSL for Linux container support"
            wsl -- bash -c "
              docker pull ${{ env.DOCKER_IMAGE }} 2>/dev/null || true
              docker run --rm --entrypoint '' \
                -v '$PWD:/workspace' \
                -w /workspace \
                -u root \
                -e IS_OMNILATEX_CONTAINER=true \
                -e CI=true \
                ${{ env.DOCKER_IMAGE }} \
                python3 build.py --mode prod build-example article
            "
          else
            # Fallback: try direct Docker with --platform
            docker pull --platform ${{ env.DOCKER_PLATFORM }} ${{ env.DOCKER_IMAGE }}
            docker run --rm --entrypoint "" \
              --platform ${{ env.DOCKER_PLATFORM }} \
              -v "$GITHUB_WORKSPACE:/workspace" \
              -w /workspace \
              -e IS_OMNILATEX_CONTAINER=true \
              -e CI=true \
              ${{ env.DOCKER_IMAGE }} \
              python3 build.py --mode prod build-example article
          fi

      - name: Verify PDF
        shell: bash
        run: |
          test -f build/examples/article.pdf && echo "✅ PDF generated" || (echo "❌ PDF not found" && exit 1)

  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [linux, windows]
    if: always()
    steps:
      - name: Cross-platform summary
        run: |
          echo "## Cross-Platform Docker CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux    | ${{ needs.linux.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | ${{ needs.windows.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
