name: Cross-Platform Docker CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: cross-platform-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_PLATFORM: linux/amd64

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout repository
        # v4
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 1

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Build article example
      env:
        IS_OMNILATEX_CONTAINER: 'true'
        CI: 'true'
      run: |
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          -u root \
          -e IS_OMNILATEX_CONTAINER=true \
          -e CI=true \
          "${{ steps.digest.outputs.image }}" \
          python3 build.py --mode prod build-example article

    - name: Verify PDF
      run: |
        test -f build/examples/article.pdf && echo "✅ PDF generated" || (echo "❌ PDF not found" && exit 1)

  windows-experimental:
    runs-on: windows-latest
    timeout-minutes: 5
    continue-on-error: true  # GitHub Windows runners cannot run Linux Docker containers
    steps:
    - name: Checkout repository
        # v4
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 1

    - name: Skip (Docker Linux containers not available on Windows)
      shell: bash
      run: |
        echo "::notice::Skipping Docker build on Windows — GitHub Windows runners cannot run Linux containers."
        echo "::notice::Use WSL2 locally or the Linux job for cross-platform verification."

  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [linux, windows-experimental]
    if: always()
    steps:
    - name: Cross-platform summary
      run: |
        echo "## Cross-Platform Docker CI Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Linux    | ${{ needs.linux.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Windows  | ${{ needs.windows-experimental.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
