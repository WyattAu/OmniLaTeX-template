name: Cross-Platform Docker CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: cross-platform-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_PLATFORM: linux/amd64

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1

    - name: Read Docker image digest
      id: digest
      uses: ./.github/actions/read-docker-digest

    - name: Pull Docker image
      run: docker pull "${{ steps.digest.outputs.image }}"

    - name: Build article example
      env:
        IS_OMNILATEX_CONTAINER: 'true'
        CI: 'true'
      run: |
        docker run --rm --entrypoint "" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          -u root \
          -e IS_OMNILATEX_CONTAINER=true \
          -e CI=true \
          "${{ steps.digest.outputs.image }}" \
          python3 build.py --mode prod build-example article

    - name: Verify PDF
      run: |
        test -f build/examples/article.pdf && echo "PDF generated" || (echo "PDF not found" && exit 1)

  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1

    - name: Install TeX Live via chocolatey
      run: |
        choco install -y texlive
        refreshenv

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: '3.13'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pymupdf pytest PyYAML python-dateutil PaperSize pytest-timeout hypothesis

    - name: Run fast test suite
      run: |
        python -m pytest tests/test_modules.py tests/test_config.py tests/test_negative.py tests/test_unicode.py -v --timeout=60 -m "not slow" --tb=short -q

    - name: Verify Python imports
      run: |
        python -c "import buildlib; print('buildlib OK')"
        python -c "from buildlib.config import ProjectConfig; print('config OK')"

  macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1

    - name: Install TeX Live via Homebrew
      run: |
        brew install --cask mactex

    - name: Add TeX Live to PATH
      run: |
        echo "/Library/TeX/texbin" >> $GITHUB_PATH

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: '3.13'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pymupdf pytest PyYAML python-dateutil PaperSize pytest-timeout hypothesis

    - name: Run fast test suite
      run: |
        pytest tests/test_modules.py tests/test_config.py tests/test_negative.py tests/test_unicode.py -v --timeout=60 -m "not slow" --tb=short -q

    - name: Verify Python imports
      run: |
        python -c "import buildlib; print('buildlib OK')"
        python -c "from buildlib.config import ProjectConfig; print('config OK')"

  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [linux, windows, macos]
    if: always()
    steps:
    - name: Cross-platform summary
      run: |
        echo "## Cross-Platform CI Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Linux (Docker) | ${{ needs.linux.result == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Windows | ${{ needs.windows.result == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| macOS | ${{ needs.macos.result == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY