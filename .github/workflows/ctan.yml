name: CTAN Package

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: [v*]
  workflow_dispatch:

concurrency:
  group: ctan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ctan-zip:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Checkout repository
      # v4
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 0

    - name: Build CTAN zip
      run: bash scripts/make-ctan-zip.sh

    - name: Validate CTAN zip contents
      run: |
        echo "Validating omnilatex.zip..."
        ERRORS=0

        if ! unzip -l omnilatex.zip | grep -q 'omnilatex\.cls$'; then
          echo "::error::omnilatex.cls not found in zip"
          ERRORS=$((ERRORS + 1))
        else
          echo "  [OK] omnilatex.cls found"
        fi

        EXPECTED_STY=(
          article book cover-letter cv dictionary dissertation
          exam handout homework inlinepaper invoice journal lecture-notes
          letter manual memo patent poster presentation beamer
          research-proposal standard syllabus technicalreport thesis
          white-paper recipe
        )
        for sty in "${EXPECTED_STY[@]}"; do
          if ! unzip -l omnilatex.zip | grep -q "document-types/${sty}\.sty$"; then
            echo "::error::document-types/${sty}.sty not found in zip"
            ERRORS=$((ERRORS + 1))
          else
            echo "  [OK] document-types/${sty}.sty found"
          fi
        done

        STY_COUNT=$(unzip -l omnilatex.zip | grep -c 'document-types/.*\.sty$' || true)
        EXPECTED_COUNT=${#EXPECTED_STY[@]}
        if [ "$STY_COUNT" -ne "$EXPECTED_COUNT" ]; then
          echo "::error::Expected ${EXPECTED_COUNT} .sty files in document-types/, found ${STY_COUNT}"
          ERRORS=$((ERRORS + 1))
        else
          echo "  [OK] All ${EXPECTED_COUNT} document-type .sty files found"
        fi

        # Validate institutions are included
        INST_COUNT=$(unzip -l omnilatex.zip | grep -c 'institutions/.*\.sty$' || true)
        if [ "$INST_COUNT" -lt 5 ]; then
          echo "::warning::Only ${INST_COUNT} institution .sty files found in zip (expected 21)"
        else
          echo "  [OK] ${INST_COUNT} institution .sty files found"
        fi

        if ! unzip -l omnilatex.zip | grep -q 'LICENSE$'; then
          echo "::error::LICENSE not found in zip"
          ERRORS=$((ERRORS + 1))
        else
          echo "  [OK] LICENSE found"
        fi

        if [ "$ERRORS" -gt 0 ]; then
          echo "::error::Validation failed with ${ERRORS} error(s)"
          exit 1
        fi

        echo ""
        echo "All CTAN zip validation checks passed."

    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Upload CTAN zip artifact
      # v4
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: omnilatex-ctan-zip
        path: omnilatex.zip
        retention-days: 90
