name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    # v4
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 1
    # v5
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: '3.13'
        cache: pip
    - run: pip install -r docs/requirements.txt
    - run: mkdocs build

    - name: Merge pages/ gallery into site
      run: |
        if [ -d pages ]; then
          for f in pages/*.html pages/*.css; do
            fname=$(basename "$f")
            # Skip index.html to avoid overwriting mkdocs home page
            if [ "$fname" = "index.html" ]; then
              cp "$f" "site/gallery-app.html"
            else
              cp "$f" "site/$fname"
            fi
          done
          # Copy .nojekyll for GitHub Pages
          cp pages/.nojekyll site/.nojekyll 2>/dev/null || true
        fi

    # v3
    - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
      with:
        path: site

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - id: deployment
      # v4
      uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
