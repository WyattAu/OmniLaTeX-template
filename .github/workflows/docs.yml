name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
    - web/**
    - docs/**
    - .github/workflows/docs.yml
  workflow_dispatch:
  workflow_run:
    workflows: [Build Examples]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip docs rebuild if triggered by a failed Build Examples run
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        fetch-depth: 1

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      working-directory: web
      run: npm ci

    - name: Build Astro site
      working-directory: web
      run: npm run build

    - name: Download PDFs from build-examples workflow
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        RUN_ID=$(gh run list -w "Build Examples" -b main --status success -L 1 --json databaseId -q '.[0].databaseId' 2>/dev/null) || true
        if [ -n "$RUN_ID" ]; then
          mkdir -p web/dist/pdfs
          gh run download "$RUN_ID" -D /tmp/pdf-artifacts 2>/dev/null || true
          find /tmp/pdf-artifacts -name '*.pdf' -exec cp {} web/dist/pdfs/ \;
          rm -rf /tmp/pdf-artifacts
          echo "Downloaded $(ls web/dist/pdfs/*.pdf 2>/dev/null | wc -l) PDFs"
        else
          echo "No successful build-examples run found, skipping PDF download"
        fi

    - name: Create _headers file
      run: |
        cat > web/dist/_headers << 'EOF'
        /*
          Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' api.github.com cdn.jsdelivr.net https://static.cloudflareinsights.com
          X-Content-Type-Options: nosniff
          Referrer-Policy: strict-origin-when-cross-origin

        /pdfs/*
          Content-Disposition: inline
          Cache-Control: public, max-age=86400
          X-Content-Type-Options: nosniff
        EOF

    - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
      with:
        path: web/dist

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
