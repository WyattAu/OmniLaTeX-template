name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: [Build Examples]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    # v4
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
    - uses: ./.github/actions/setup-python
    - run: pip install -r docs/requirements.txt
    - run: mkdocs build

    - name: Merge pages/ gallery into site
      run: |
        if [ -d pages ]; then
          for f in pages/*.html pages/*.css; do
            fname=$(basename "$f")
            # Skip index.html to avoid overwriting mkdocs home page
            if [ "$fname" = "index.html" ]; then
              cp "$f" "site/gallery-app.html"
            else
              cp "$f" "site/$fname"
            fi
          done
          # Copy .nojekyll for GitHub Pages
          cp pages/.nojekyll site/.nojekyll 2>/dev/null || true
          sed -i 's|href="index\.html"|href="gallery-app.html"|g' site/gallery-app.html site/gallery.html site/verify.html
        fi

    - name: Download PDFs from build-examples workflow
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        RUN_ID=$(gh run list -w "Build Examples" -b main --status success -L 1 --json databaseId -q '.[0].databaseId' 2>/dev/null) || true
        if [ -n "$RUN_ID" ]; then
          mkdir -p site/pdfs
          gh run download "$RUN_ID" -D /tmp/pdf-artifacts 2>/dev/null || true
          find /tmp/pdf-artifacts -name '*.pdf' -exec cp {} site/pdfs/ \;
          rm -rf /tmp/pdf-artifacts
          echo "Downloaded $(ls site/pdfs/*.pdf 2>/dev/null | wc -l) PDFs"
        else
          echo "No successful build-examples run found, skipping PDF download"
        fi

    - name: Create Cloudflare _headers file
      run: |
        cat > site/_headers << 'EOF'
        /*
          Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' api.github.com
          X-Content-Type-Options: nosniff
          Referrer-Policy: strict-origin-when-cross-origin

        /*.html
          X-Frame-Options: DENY
          Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' api.github.com; frame-ancestors 'none'

        /pdfs/*
          Content-Disposition: inline
          Cache-Control: public, max-age=86400
          X-Content-Type-Options: nosniff
        EOF

    # v3
    - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
      with:
        path: site

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - id: deployment
      # v4
      uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
