name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
    - web/**
    - docs/**
    - .github/workflows/docs.yml
  workflow_dispatch:
  workflow_run:
    workflows: [Build Examples]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      working-directory: web
      run: npm ci

    - name: Build Astro site
      working-directory: web
      run: npm run build

    - name: Download PDFs from build-examples workflow
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        RUN_ID=$(gh run list -w "Build Examples" -b main --status success -L 1 --json databaseId -q '.[0].databaseId' 2>/dev/null) || true
        if [ -n "$RUN_ID" ]; then
          mkdir -p web/dist/pdfs
          gh run download "$RUN_ID" -D /tmp/pdf-artifacts 2>/dev/null || true
          find /tmp/pdf-artifacts -name '*.pdf' -exec cp {} web/dist/pdfs/ \;
          rm -rf /tmp/pdf-artifacts
          echo "Downloaded $(ls web/dist/pdfs/*.pdf 2>/dev/null | wc -l) PDFs"
        else
          echo "No successful build-examples run found, skipping PDF download"
        fi

    - name: Create Cloudflare _redirects and _headers files
      run: |
        # _redirects: rewrite /OmniLaTeX-template/* to /* for custom domain
        # The Astro build uses base='/OmniLaTeX-template/' for GitHub Pages.
        # The Cloudflare custom domain (omnilatex-template.wyattau.com) serves
        # from root, so these rewrites map prefixed paths to actual files.
        cat > web/dist/_redirects << 'EOF'
        /OmniLaTeX-template/assets/* /assets/:splat 200
        /OmniLaTeX-template/pdfs/* /pdfs/:splat 200
        /OmniLaTeX-template/favicon.svg /favicon.svg 200
        EOF

        cat > web/dist/_headers << 'EOF'
        /*
          Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' api.github.com cdn.jsdelivr.net https://static.cloudflareinsights.com
          X-Content-Type-Options: nosniff
          Referrer-Policy: strict-origin-when-cross-origin

        /pdfs/*
          Content-Disposition: inline
          Cache-Control: public, max-age=86400
          X-Content-Type-Options: nosniff

        /OmniLaTeX-template/assets/*.js
          Content-Type: application/javascript

        /OmniLaTeX-template/assets/*.css
          Content-Type: text/css
        EOF

    - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
      with:
        path: web/dist

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
