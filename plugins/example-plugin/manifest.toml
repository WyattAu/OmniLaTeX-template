[plugin]
name = "example-plugin"
version = "1.0.0"
description = "Example plugin demonstrating the OmniLaTeX plugin system"
author = "Wyatt Au"
license = "Apache-2.0"
homepage = "https://github.com/WyattAu/OmniLaTeX-template"

[plugin.requirements]
omnilatex = ">=2.4.0"
texlive = ">=2024"
engine = "lualatex"
python = false

[plugin.dependencies]
# No dependencies

[plugin.conflicts]
# No conflicts

[plugin.files]
main = "omnilatex-plugin-example.sty"
docs = ["README.md"]

[plugin.security]
shell_escape = false
file_write = false
network = false
