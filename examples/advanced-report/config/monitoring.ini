# Nexus Technologies Monitoring Agent Configuration
# Version: 2.4.1
# Last Modified: 2026-03-01

[agent]
hostname = db-primary-01
interval = 60
batch_size = 500
log_level = info
metrics_dir = /var/lib/monitoring/metrics

[database]
host = db-primary.internal.nexus.io
port = 5432
name = nexus_metrics
user = monitor_agent
pool_size = 20
ssl_mode = verify-full
connect_timeout = 5

[ingestion]
endpoint = https://metrics-api.nexus.io/api/v2/metrics/ingest
token_file = /etc/monitoring/.api_token
retry_count = 3
retry_delay = 5
timeout = 10

[thresholds]
cpu_warning = 80
cpu_critical = 90
memory_warning = 75
memory_critical = 90
disk_iops_warning = 15000
disk_iops_critical = 20000
latency_warning_ms = 200
latency_critical_ms = 500
