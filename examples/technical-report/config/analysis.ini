analysis_timeout = 300
max_retries = 3
log_level = INFO

[database]
host = db-analytics.contoso.internal
port = 5432
name = infra_metrics
pool_size = 20
ssl_mode = verify-full

[monitoring]
interval_seconds = 60
retention_days = 90
alert_threshold_p99 = 500
alert_threshold_iops_util = 0.85

[storage]
backend = nvme-raid10
iops_ceiling = 80000
read_ahead_kb = 256
write_cache = write-back
